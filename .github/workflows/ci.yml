name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  UV_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu"
  UV_INDEX_STRATEGY: "unsafe-best-match"

jobs:
  prepare-environment:
    name: Prepare dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      lock_drift: ${{ steps.lockcheck.outputs.drift }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Validate uv.lock
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/')
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 10
          command: uv lock --check

      - name: Refresh uv.lock for Dependabot test run
        if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'dependabot/')
        run: uv lock

      - name: Compile locked requirements (runtime - core only)
        run: uv export --no-dev --format requirements-txt -p 3.13 -o requirements.txt

      - name: Compile locked requirements (all extras for tests)
        run: |
          # Include all extras for comprehensive test coverage
          # Scheduler import is now lazy in TelegramBot, avoiding metaclass conflicts
          # Use uv export (lockfile-based) so versions stay consistent with dev group
          uv export --no-dev --no-hashes --format requirements-txt -p 3.13 \
            --extra api \
            --extra ml \
            --extra youtube \
            --extra export \
            --extra scheduler \
            --extra mcp \
            --extra graph \
            -o requirements-all.txt

      - name: Compile locked requirements (dev)
        run: uv export --only-group dev --no-hashes --format requirements-txt -p 3.13 -o requirements-dev.txt

      - name: Check lockfile drift
        id: lockcheck
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/')
        run: |
          if git diff --quiet uv.lock requirements.txt requirements-dev.txt requirements-all.txt; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "Lockfiles are up to date."
          else
            echo "::error::Lockfile drift detected — the following files differ from what uv export produces:"
            git diff --name-only uv.lock requirements.txt requirements-dev.txt requirements-all.txt
            echo ""
            echo "Fix: run 'make lock-uv' locally and commit the updated files."
            echo "     Alternatively, trigger the 'Update Lockfiles' workflow on this branch."
            exit 1
          fi

      - name: Report transient Dependabot lock refresh
        if: (github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'dependabot/')) && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
        run: |
          if git diff --quiet uv.lock requirements.txt requirements-dev.txt requirements-all.txt; then
            echo "Dependabot dependency update did not require lockfile changes."
          else
            echo "::notice::Dependabot dependency update requires regenerated lock artifacts. CI is testing the transient refresh; commit updated lockfiles before merging if this PR is kept."
            git diff --name-only uv.lock requirements.txt requirements-dev.txt requirements-all.txt
          fi

      - name: Guard against excluded (malicious/yanked) versions
        # Defense in depth: pyproject excludes known-bad releases (e.g. fastapi
        # !=0.136.3, osv.dev/MAL-2026-4750) via PEP 508 `!=`, but a stale export
        # could still pin one. This fails CI if any requirements file does.
        run: python3 tools/scripts/check_excluded_versions.py

      - name: Upload compiled requirements
        uses: actions/upload-artifact@v7
        with:
          name: compiled-requirements
          path: |
            uv.lock
            requirements.txt
            requirements-all.txt
            requirements-dev.txt
          retention-days: 1

  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            #node_modules
            #.venv

  docs-consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check README facts against ground truth
        run: python tools/check_readme_facts.py

  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --accept 200,204,301,302,429
            --timeout 10
            --max-retries 3
            --exclude 'localhost|127\.0\.0\.1|example\.com|https://github\.com/.*/pull/|https://github\.com/.*/issues|https://github\.com/.*/releases|wakamaifondue\.com|webaim\.org'
            --exclude-path .venv
            --exclude-path node_modules
            '**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-and-format:
    name: Lint and Format Checks
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Python environment
        id: cache-python-env
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: python-lint-${{ runner.os }}-${{ hashFiles('requirements-all.txt', 'requirements-dev.txt') }}
          restore-keys: |
            python-lint-${{ runner.os }}-

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv pip sync --system requirements-all.txt requirements-dev.txt

      - name: Validate OpenAPI spec
        run: |
          uv run --frozen --extra api openapi-spec-validator docs/openapi/mobile_api.yaml
          uv run --frozen --extra api openapi-spec-validator docs/openapi/mobile_api.json

      - name: Check generated OpenAPI drift
        run: uv run --frozen --extra api python tools/scripts/generate_openapi.py --check

      - name: Check OpenAPI spec sync with code
        run: |
          uv run --frozen --extra api pytest tests/api/test_openapi_sync.py tests/api/test_openapi_security.py tests/api/test_runtime_openapi_drift.py tests/tools/test_generate_openapi.py \
            -v --tb=short

      - name: Lint (ruff) - comprehensive
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Import sort check (isort)
        run: isort --check-only .

      - name: Enforce class size limit
        run: python tools/scripts/check_class_size.py --max-loc 1000 --baseline tools/scripts/class_size_baseline.json

      - name: Enforce file size limit
        env:
          PR_ACTOR: ${{ github.actor }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$PR_ACTOR" == "dependabot[bot]" || "$PR_HEAD_REF" == dependabot/* ]]; then
            git checkout -- uv.lock requirements.txt requirements-all.txt requirements-dev.txt
          fi
          python tools/scripts/check_file_size.py --max-loc 1500 --baseline tools/scripts/file_size_baseline.json

      - name: Check code complexity
        run: |
          echo "Checking code complexity with radon..."
          uv pip install --system radon
          radon cc app --min B --show-complexity --no-assert
          radon mi app --min B

      - name: Semgrep (Python mutability rules)
        run: |
          uv pip install --system semgrep --quiet
          semgrep --config semgrep/python-mutability.yml --error app/ tests/

      - name: Semgrep (Python bare-except rules)
        run: semgrep --config semgrep/python-bare-except.yml --error app/ tests/

  type-check:
    name: Type Check (mypy)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Python environment
        id: cache-python-env
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: python-type-${{ runner.os }}-${{ hashFiles('requirements-all.txt', 'requirements-dev.txt') }}
          restore-keys: |
            python-type-${{ runner.os }}-

      - name: Cache mypy
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv pip sync --system requirements-all.txt requirements-dev.txt

      - name: Type check (mypy)
        run: mypy app --show-error-codes --pretty --cache-dir .mypy_cache


  import-linter:
    name: Architecture - Import Linter (layering)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        # import-linter builds the import graph by importing app.*, so the full
        # runtime deps must be present. It is a CI-only architecture gate, so it
        # is installed ad-hoc here rather than pinned into the lockfile.
        run: |
          uv pip sync --system requirements-all.txt requirements-dev.txt
          uv pip install --system import-linter

      # GATING: all layering contracts are green (the restore-architecture-layering
      # epic closed every known violation), so the full suite gates the build and
      # fails on ANY regression. Contracts live in .importlinter; see
      # docs/explanation/architecture-overview.md#layering-contracts.
      - name: Enforce layering contracts (gating)
        run: lint-imports


  test:
    name: Unit Tests and Coverage
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python environment
        id: cache-python-env
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: python-test-${{ runner.os }}-${{ hashFiles('requirements-all.txt', 'requirements-dev.txt') }}
          restore-keys: |
            python-test-${{ runner.os }}-

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies (all extras for comprehensive testing)
        run: uv pip sync --system requirements-all.txt requirements-dev.txt

      - name: Install additional test/coverage tools
        run: uv pip install --system pytest-cov pytest-xdist pytest-rerunfailures pytest-asyncio coverage[toml]

      - name: Run unit tests with coverage
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          pytest \
            -p pytest_cov \
            -p xdist \
            -p pytest_rerunfailures \
            -p pytest_asyncio.plugin \
            tests/ \
            -m "not integration" \
            --ignore=tests/benchmarks \
            --ignore=tests/chaos \
            --ignore=tests/integration \
            --ignore=tests/stress \
            --ignore=tests/api/test_background_processor.py \
            --ignore=tests/test_api_rate_limit_and_sync.py \
            --ignore=tests/test_digest_api_service.py \
            --ignore=tests/test_llm_response_workflow.py \
            --ignore=tests/test_mcp_tool_registrations.py \
            --ignore=tests/test_model_validation.py \
            --ignore=tests/test_openrouter_metrics.py \
            --ignore=tests/test_pure_summary_service.py \
            --ignore=tests/test_runtime_di_architecture.py \
            --ignore=tests/test_scraper_factory.py \
            --ignore=tests/test_smart_collection_handler.py \
            --ignore=tests/test_twitter_article_link_resolver.py \
            --ignore=tests/test_user_digest_preference.py \
            --ignore=tests/test_webapp_auth_middleware.py \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-report=html \
            --cov-config=pyproject.toml \
            --junit-xml=junit-${{ matrix.python-version }}.xml \
            --verbose \
            --maxfail=10 \
            --tb=short \
            --strict-markers \
            --reruns=3 \
            --reruns-delay=1 \
            -n auto

          # Run benchmarks separately without parallel execution
          pytest \
            tests/benchmarks/ \
            -p pytest_benchmark.plugin \
            --verbose \
            --tb=short \
            --benchmark-only \
            --benchmark-disable-gc \
            --benchmark-warmup=on

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            junit-*.xml
            htmlcov/
            coverage.xml
          retention-days: 7

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: "junit-*.xml"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          # Threshold is set in pyproject.toml [tool.coverage.report] fail_under.
          # A below-threshold run fails this step and therefore fails CI.
          # To raise the bar: bump fail_under in pyproject.toml in a separate commit.
          coverage report \
            --omit="app/db/alembic/*,app/static/*,app/cli/migrations/*" \
            --show-missing

      - name: API surface count (informational)
        continue-on-error: true
        run: python3 tools/count_api_endpoints.py

  bandit-scan:
    name: Security - Bandit (SAST)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache Python environment
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: python-bandit-${{ runner.os }}
          restore-keys: |
            python-bandit-${{ runner.os }}-

      - name: Install bandit
        run: pip install --no-cache-dir bandit

      - name: Run Bandit (SAST)
        run: bandit -r app -ll

  pip-audit-scan:
    name: Security - pip-audit (Dependencies)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache Python environment
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: python-pip-audit-${{ runner.os }}
          restore-keys: |
            python-pip-audit-${{ runner.os }}-

      - name: Install pip-audit
        run: pip install --no-cache-dir pip-audit

      - name: Prepare audit requirements
        run: |
          # Filter out spaCy language models that aren't available on PyPI
          cat requirements-all.txt requirements-dev.txt | \
            grep -v "en-core-web-sm" | \
            grep -v "ru-core-news-sm" | \
            # Torch does not yet publish Python 3.13 wheels to PyPI; skip it for auditing
            grep -v "^torch==" | \
            # protobuf is pinned via [tool.uv] override-dependencies and conflicts with
            # transitive resolvers under plain pip (used by pip-audit). Skip it here.
            grep -v "^protobuf==" | \
            # mypy 2.x ships ast-serialize as a transitive; adding it to the
            # audit input pushes pip's resolver into a backtracking path that
            # ResolutionImpossible's on the cuda/triton/sentence-transformers
            # set (uv handles the same constraints fine). Skip it — it's a
            # type-check-only dep with no runtime presence.
            grep -v "^ast-serialize==" | \
            # pip-audit shells out to plain pip, whose resolver cannot combine
            # websockets 16 with the uv-resolved langgraph-sdk/uvicorn set.
            # OSV scans uv.lock directly, so websockets remains covered there.
            grep -v "^websockets==" | \
            sort -u > requirements-audit.txt

      - name: Run pip-audit
        # torch CVE-2025-3000 has no upstream fix (ml extra only, not in the
        # request path); also suppressed for the OSV scanner via osv-scanner.toml.
        run: pip-audit -r requirements-audit.txt --strict --ignore-vuln CVE-2025-3000

  safety-scan:
    name: Security - Safety (Dependencies)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Cache Python environment
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: python-safety-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            python-safety-${{ runner.os }}-

      # Export ALL extras so Safety sees the complete dependency surface.
      # The prepare-environment artifact only includes api, ml, youtube, export,
      # scheduler, mcp — extras otel, push, transcription, gemini,
      # scraper_ai, attachment, browser_scraper, monitoring, and graph are
      # omitted there. We regenerate a comprehensive requirements file here
      # rather than relying on the shared artifact. The `graph` extra (ADR-0001
      # reversed) adds langgraph-checkpoint-postgres + psycopg-pool on top of the
      # langchain/langgraph ecosystem already pulled transitively by scraper_ai,
      # so Safety/pip-audit triage those advisories too.
      - name: Export comprehensive requirements (all extras)
        run: |
          uv export --no-dev --no-hashes --format requirements-txt -p 3.13 \
            --extra api \
            --extra ml \
            --extra youtube \
            --extra export \
            --extra scheduler \
            --extra mcp \
            --extra otel \
            --extra push \
            --extra transcription \
            --extra gemini \
            --extra scraper_ai \
            --extra attachment \
            --extra browser_scraper \
            --extra monitoring \
            --extra graph \
            -o requirements-safety.txt
          # Dev group (type-stubs, test tools) also carry CVE-able packages
          uv export --only-group dev --no-hashes --format requirements-txt -p 3.13 \
            -o requirements-dev-safety.txt

      - name: Install dependencies and safety (all extras for comprehensive scanning)
        run: |
          uv pip sync --system requirements-safety.txt requirements-dev-safety.txt
          uv pip install --system safety

      # Secret must be added in GitHub repo settings → Secrets → SAFETY_API_KEY
      - name: Run Safety
        # torch CVE-2025-3000 (SFTY-20250331-30014): no upstream fix, ml extra
        # only; also accepted for OSV (osv-scanner.toml) and pip-audit.
        run: safety check -r requirements-safety.txt -r requirements-dev-safety.txt --full-report --ignore SFTY-20250331-30014
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

  osv-scanner-scan:
    name: Security - OSV Scanner (uv.lock)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # OSV Scanner reads uv.lock directly, so it sees every package in the
      # lockfile including torch, nvidia-*, triton, and other packages that
      # pip-audit skips because they lack PyPI 3.13 wheels or conflict with
      # pip's resolver. This fills the coverage gap left by pip-audit's
      # requirements-audit.txt filter.
      - name: OSV Scanner (uv.lock)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=uv.lock

  docker-build:
    name: Docker - Build smoke test
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # paths-filter scopes the actual build to commits that touched Docker
      # inputs. PRs always build; pushes to main only build when Dockerfile,
      # app sources, lockfiles, or pyproject change. Catches Dockerfile and
      # dependency-pin regressions before release.yml does.
      - name: Detect Docker-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docker:
              - 'ops/docker/Dockerfile'
              - 'ops/docker/Dockerfile.api'
              - 'app/**'
              - 'bot.py'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'uv.lock'

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request' || steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        if: github.event_name == 'pull_request' || steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ops/docker/Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-api-browser-smoke:
    name: Docker API - Playwright browser smoke test
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Docker-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docker:
              - 'ops/docker/Dockerfile.api'
              - 'app/**'
              - 'pyproject.toml'
              - 'uv.lock'

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request' || steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        if: github.event_name == 'pull_request' || steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ops/docker/Dockerfile.api
          push: false
          load: true
          tags: ratatoskr-api:smoke
          build-args: WITH_PLAYWRIGHT=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Chromium resolves as appuser (UID 1000)
        if: github.event_name == 'pull_request' || steps.filter.outputs.docker == 'true'
        run: |
          docker run --rm \
            --user 1000 \
            ratatoskr-api:smoke \
            python -c "
          import os, sys
          browsers_path = os.environ.get('PLAYWRIGHT_BROWSERS_PATH', '')
          print(f'PLAYWRIGHT_BROWSERS_PATH={browsers_path}')
          assert browsers_path == '/ms-playwright', f'Wrong path: {browsers_path!r}'

          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              exe = p.chromium.executable_path
              print(f'Chromium executable: {exe}')
              assert exe.startswith('/ms-playwright'), f'Executable not under /ms-playwright: {exe!r}'
              assert os.path.isfile(exe), f'Executable does not exist: {exe!r}'
              assert os.access(exe, os.X_OK), f'Executable not executable by current user: {exe!r}'

          print('Browser smoke test passed.')
          "

  compose-config-check:
    name: Docker Compose - Config smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate production compose renders cleanly
        env:
          POSTGRES_PASSWORD: ci-smoke
        run: docker compose -f ops/docker/docker-compose.yml config --quiet

      - name: Verify core service commands are present
        env:
          POSTGRES_PASSWORD: ci-smoke
        run: |
          config=$(docker compose -f ops/docker/docker-compose.yml config)
          grep -Fq 'CMD ["python", "-m", "bot"]' ops/docker/Dockerfile \
            || { echo "MISSING Dockerfile bot command"; exit 1; }
          CONFIG="$config" python - <<'PY'
          import os
          import sys
          import yaml

          services = yaml.safe_load(os.environ["CONFIG"])["services"]

          expected_commands = {
              "migrate": ["python", "-m", "app.cli.migrate_db"],
              "worker": ["taskiq", "worker"],
              "scheduler": ["taskiq", "scheduler", "app.tasks.scheduler:scheduler"],
          }
          for service_name, expected in expected_commands.items():
              command = services[service_name].get("command", [])
              if isinstance(command, str):
                  command = command.split()
              if command[: len(expected)] != expected:
                  raise SystemExit(f"MISSING command for {service_name}: {' '.join(expected)}")

          worker_command = services["worker"].get("command", [])
          if "app.tasks.import_tasks" not in worker_command:
              raise SystemExit("MISSING worker task module: app.tasks.import_tasks")
          PY
          echo "All expected service commands found."

      - name: Verify all core services are listed
        env:
          POSTGRES_PASSWORD: ci-smoke
        run: |
          services=$(docker compose -f ops/docker/docker-compose.yml config --services)
          for svc in migrate ratatoskr worker scheduler mobile-api; do
            echo "$services" | grep -q "^${svc}$" \
              || { echo "MISSING service: $svc"; exit 1; }
          done
          echo "All core services present."

      - name: Validate dev overlay renders cleanly
        env:
          POSTGRES_PASSWORD: ci-smoke
        run: |
          docker compose \
            -f ops/docker/docker-compose.yml \
            -f ops/docker/docker-compose.dev.yml \
            config --quiet

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks (workspace)
        if: ${{ github.event_name == 'pull_request' }}
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            detect --config .gitleaks.toml --source . --no-git --redact --verbose
            --report-format sarif --report-path ./results-workspace.sarif

      - name: Ensure Gitleaks SARIF exists (workspace)
        if: ${{ github.event_name == 'pull_request' && (success() || failure()) }}
        run: |
          if [ ! -f ./results-workspace.sarif ]; then
            python -c 'from pathlib import Path; import json; payload = {"version": "2.1.0","runs": [{"tool": {"driver": {"name": "gitleaks","informationUri": "https://github.com/gitleaks/gitleaks","rules": []}}, "results": []}]}; Path("results-workspace.sarif").write_text(json.dumps(payload, indent=2))'
            echo "Created empty SARIF report for workspace scan."
          fi

      - name: Upload Gitleaks SARIF (workspace)
        if: ${{ github.event_name == 'pull_request' && (success() || failure()) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-workspace.sarif
          category: gitleaks-workspace

      - name: Gitleaks (history)
        if: ${{ github.event_name != 'pull_request' }}
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --config .gitleaks.toml --redact --verbose --report-format sarif --report-path results-history.sarif

      - name: Ensure Gitleaks SARIF exists (history)
        if: ${{ github.event_name != 'pull_request' && (success() || failure()) }}
        run: |
          if [ ! -f ./results-history.sarif ]; then
            python -c 'from pathlib import Path; import json; payload = {"version": "2.1.0","runs": [{"tool": {"driver": {"name": "gitleaks","informationUri": "https://github.com/gitleaks/gitleaks","rules": []}}, "results": []}]}; Path("results-history.sarif").write_text(json.dumps(payload, indent=2))'
            echo "Created empty SARIF report for history scan."
          fi

      - name: Upload Gitleaks SARIF (history)
        if: ${{ github.event_name != 'pull_request' && (success() || failure()) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-history.sarif
          category: gitleaks-history

  integration-tests:
    name: Integration Tests
    needs: [prepare-environment, test]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true

      - name: Install dependencies (all extras for integration tests)
        run: uv pip sync --system requirements-all.txt requirements-dev.txt

      - name: Install test tools
        run: uv pip install --system pytest pytest-timeout pytest-xdist pytest-rerunfailures pytest-asyncio

      - name: Run integration tests
        id: integration_tests
        run: |
          echo "::group::Running integration tests"
          pytest \
            tests/ \
            -m "integration" \
            --ignore=tests/benchmarks \
            --ignore=tests/integration/test_batch_relationship_flow.py \
            --ignore=tests/api/test_background_processor.py \
            --ignore=tests/test_api_rate_limit_and_sync.py \
            --verbose \
            --maxfail=5 \
            --tb=short \
            --strict-markers \
            --timeout=60 \
            --reruns=2 \
            --reruns-delay=2 || EXIT_CODE=$?

          # Exit code 5 means no tests collected (no integration tests marked)
          # This is acceptable - treat as success
          if [ "${EXIT_CODE:-0}" -eq 5 ]; then
            echo "::notice::No integration tests found (all tests deselected)"
            exit 0
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "::error::Integration tests failed with exit code ${EXIT_CODE}"
            exit "${EXIT_CODE}"
          fi
          echo "::endgroup::"

      - name: Report integration test status
        if: ${{ failure() && steps.integration_tests.outcome == 'failure' }}
        run: echo "::warning::Integration tests failed - review logs above"

  pr-summary:
    name: PR Summary
    if: github.event_name == 'pull_request'
    needs: [prepare-environment, markdown-lint, link-check, lint-and-format, type-check, test, integration-tests, bandit-scan, pip-audit-scan, safety-scan, osv-scanner-scan, secrets, migration-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Create PR Comment
        uses: actions/github-script@v9
        with:
          script: |
            let summary = '## ✅ CI Summary\n\n';
            // Lockfile drift is a hard CI failure — if this job runs, lockfiles are current.
            summary += '✅ Lockfiles are up to date\n\n';
            summary += '### Checks Completed\n';
            summary += '- ✅ Markdown lint and link checks\n';
            summary += '- ✅ Code linting and formatting\n';
            summary += '- ✅ Type checking (mypy)\n';
            summary += '- ✅ Unit tests with coverage\n';
            summary += '- ✅ Integration and migration smoke tests\n';
            summary += '- ✅ Security scanning\n';
            summary += '- ✅ Secret scanning\n\n';
            summary += '_See [full workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed results._';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('CI Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            }

  migration-smoke-test:
    name: Migration Smoke Test (Alembic + PostgreSQL)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ratatoskr_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ratatoskr_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv pip sync --system requirements-all.txt requirements-dev.txt

      - name: Run migration round-trip
        run: |
          set -euo pipefail
          python -m app.cli.migrate_db
          alembic downgrade -1
          alembic upgrade head
          alembic current 2>&1 | grep -q "(head)"

  postgres-tests:
    name: Postgres-gated Tests (parity + persistence)
    needs: prepare-environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ratatoskr_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      # ``conftest.py`` mirrors TEST_DATABASE_URL into DATABASE_URL and the
      # ``database``/``session`` fixtures migrate the schema via Alembic. Without
      # this var these suites pytest.skip (they ran as no-ops in CI before — the
      # gap this job closes).
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ratatoskr_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compiled requirements
        uses: actions/download-artifact@v8
        with:
          name: compiled-requirements
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies (all extras for DB-backed tests)
        run: uv pip sync --system requirements-all.txt requirements-dev.txt

      - name: Install test tools
        run: uv pip install --system pytest pytest-xdist pytest-rerunfailures pytest-asyncio

      - name: Run Postgres-gated parity + persistence suites
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          pytest \
            -p xdist \
            -p pytest_rerunfailures \
            -p pytest_asyncio.plugin \
            tests/parity \
            -m "not integration" \
            --verbose \
            --maxfail=10 \
            --tb=short \
            --strict-markers \
            --reruns=2 \
            --reruns-delay=1

  status-check:
    name: CI Status Check
    if: always()
    needs: [prepare-environment, markdown-lint, link-check, lint-and-format, type-check, test, postgres-tests, bandit-scan, pip-audit-scan, safety-scan, osv-scanner-scan, docker-build, docker-api-browser-smoke, compose-config-check, secrets, integration-tests, migration-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all job results
        run: |
          echo "Checking CI status..."

          # Check critical jobs
          if [[ "${{ needs.prepare-environment.result }}" != "success" ]]; then
            echo "::error::prepare-environment job failed"
            exit 1
          fi

          if [[ "${{ needs.lint-and-format.result }}" != "success" ]]; then
            echo "::error::lint-and-format job failed"
            exit 1
          fi

          if [[ "${{ needs.type-check.result }}" != "success" ]]; then
            echo "::error::type-check job failed"
            exit 1
          fi

          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::test job failed"
            exit 1
          fi

          if [[ "${{ needs.postgres-tests.result }}" != "success" ]]; then
            echo "::error::postgres-tests job failed"
            exit 1
          fi

          if [[ "${{ needs.markdown-lint.result }}" != "success" ]]; then
            echo "::error::markdown-lint job failed"
            exit 1
          fi

          if [[ "${{ needs.link-check.result }}" != "success" ]]; then
            echo "::error::link-check job failed"
            exit 1
          fi

          # Security scans (parallel)
          if [[ "${{ needs.bandit-scan.result }}" != "success" ]]; then
            echo "::error::bandit-scan job failed"
            exit 1
          fi

          if [[ "${{ needs.pip-audit-scan.result }}" != "success" ]]; then
            echo "::error::pip-audit-scan job failed"
            exit 1
          fi

          if [[ "${{ needs.safety-scan.result }}" != "success" ]]; then
            echo "::error::safety-scan job failed"
            exit 1
          fi

          if [[ "${{ needs.osv-scanner-scan.result }}" != "success" ]]; then
            echo "::error::osv-scanner-scan job failed"
            exit 1
          fi

          # docker-build is a build-only smoke test; treat skip as ok (paths
          # filter elides the build when only non-Docker files changed).
          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "::error::docker-build job failed"
            exit 1
          fi

          if [[ "${{ needs.docker-api-browser-smoke.result }}" == "failure" ]]; then
            echo "::error::docker-api-browser-smoke job failed"
            exit 1
          fi

          if [[ "${{ needs.compose-config-check.result }}" != "success" ]]; then
            echo "::error::compose-config-check job failed"
            exit 1
          fi

          if [[ "${{ needs.secrets.result }}" != "success" ]]; then
            echo "::error::secrets job failed"
            exit 1
          fi

          # Integration tests may be skipped when not required
          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "::error::integration-tests job failed"
            exit 1
          fi

          if [[ "${{ needs.migration-smoke-test.result }}" != "success" ]]; then
            echo "::error::migration-smoke-test job failed"
            exit 1
          fi

          echo "✅ All critical CI checks passed!"
