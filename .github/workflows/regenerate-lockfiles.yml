name: Regenerate Lockfiles

on:
  workflow_dispatch:

concurrency:
  group: regen-lockfiles
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

env:
  UV_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu"
  UV_INDEX_STRATEGY: "unsafe-best-match"

jobs:
  regen-lockfiles:
    runs-on: ubuntu-latest
    env:
      ACTIONS_PR_TOKEN: ${{ secrets.ACTIONS_PR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      # Guard: assert SAFETY_API_KEY is set and the private Safety index is
      # reachable before running `uv lock`. Without this check, a lapsed
      # subscription causes uv to silently fall back to PyPI-only resolution,
      # which could re-resolve a yanked or malicious release that the Safety
      # index would have blocked (e.g. fastapi 0.136.3 / MAL-2026-4750).
      # See docs/reference/dependency-supply-chain.md for the full threat model.
      - name: Assert Safety index is reachable
        id: safety_index
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          if [ -z "${SAFETY_API_KEY}" ]; then
            echo "::error::SAFETY_API_KEY secret is not set. uv lock would fall back to PyPI-only resolution, risking re-resolution of yanked/malicious releases. Set the secret and re-run."
            exit 1
          fi
          SAFETY_INDEX_URL="https://pkgs.safetycli.com/repository/po4yka/project/ratatoskr/pypi/simple/"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 15 \
            --user "${SAFETY_API_KEY}:" \
            "${SAFETY_INDEX_URL}")
          if [ "${HTTP_STATUS}" = "401" ] || [ "${HTTP_STATUS}" = "403" ]; then
            echo "::error::Safety index returned HTTP ${HTTP_STATUS}. The subscription may have lapsed or the key may be invalid. Aborting to prevent PyPI-only fallback resolution."
            exit 1
          fi
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::warning::Safety index returned HTTP ${HTTP_STATUS}. Skipping automated lock refresh for this run; ci.yml still validates committed lockfile drift."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "Safety index reachable (HTTP ${HTTP_STATUS}). Proceeding with uv lock."

      - name: Regenerate lockfiles
        if: steps.safety_index.outputs.available == 'true'
        run: |
          set -euo pipefail
          uv lock
          uv export --no-dev --format requirements-txt -p 3.13 -o requirements.txt
          uv export --only-group dev --no-hashes --format requirements-txt -p 3.13 -o requirements-dev.txt
          uv export --no-dev --no-hashes --format requirements-txt -p 3.13 \
            --extra api \
            --extra ml \
            --extra youtube \
            --extra export \
            --extra scheduler \
            --extra mcp \
            -o requirements-all.txt

      - name: Create Pull Request (using PAT if provided)
        if: ${{ steps.safety_index.outputs.available == 'true' && env.ACTIONS_PR_TOKEN != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.ACTIONS_PR_TOKEN }}
          commit-message: "chore(ci): regenerate lockfiles via uv"
          title: "chore(ci): regenerate lockfiles via uv"
          body: "Automated lockfile regeneration triggered by CI failure."
          branch: chore/regen-lockfiles
          labels: dependencies
          add-paths: |
            uv.lock
            requirements.txt
            requirements-dev.txt
            requirements-all.txt

      - name: Create Pull Request (best-effort with GITHUB_TOKEN)
        if: ${{ steps.safety_index.outputs.available == 'true' && env.ACTIONS_PR_TOKEN == '' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(ci): regenerate lockfiles via uv"
          title: "chore(ci): regenerate lockfiles via uv"
          body: "Automated lockfile regeneration triggered by CI failure."
          branch: chore/regen-lockfiles
          labels: dependencies
          add-paths: |
            uv.lock
            requirements.txt
            requirements-dev.txt
            requirements-all.txt

      - name: Note PR permission restriction
        if: ${{ steps.safety_index.outputs.available == 'true' && env.ACTIONS_PR_TOKEN == '' }}
        run: |
          echo "::warning::Repository blocks GitHub Actions from creating PRs."
          echo "Set a repo/org secret 'ACTIONS_PR_TOKEN' with 'contents' and 'pull_requests' write permissions (fine-grained PAT), or enable the setting to allow Actions to create PRs."
