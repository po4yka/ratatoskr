name: Skills sync

on:
  push:
    branches: [ main, master ]
    paths:
      - ".claude/skills/**"
      - ".codex/skills/**"
      - ".agents/skills/**"
      - ".claude/commands/**"
      - ".codex/commands/**"
      - "tools/scripts/check_skills_sync.py"
      - ".github/workflows/skills-sync.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - ".claude/skills/**"
      - ".codex/skills/**"
      - ".agents/skills/**"
      - ".claude/commands/**"
      - ".codex/commands/**"
      - "tools/scripts/check_skills_sync.py"
      - ".github/workflows/skills-sync.yml"

concurrency:
  group: skills-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check agent skill mirrors are in sync
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Run skills sync check
        run: python tools/scripts/check_skills_sync.py
