name: Update Lockfiles

on:
  push:
    paths:
      - "pyproject.toml"
  workflow_dispatch: {}

concurrency:
  group: update-locks-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

env:
  UV_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu"
  # unsafe-first-match: resolve from the first index (in order) that provides a
  # package, not the highest version across indexes — prevents dependency
  # confusion at lock-generation time. Do NOT use unsafe-best-match.
  UV_INDEX_STRATEGY: "unsafe-first-match"

jobs:
  update-locks:
    runs-on: ubuntu-latest
    env:
      ACTIONS_PR_TOKEN: ${{ secrets.ACTIONS_PR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      # Guard: assert SAFETY_API_KEY is set and the private Safety index is
      # reachable before running `uv lock`. Without this check, a lapsed
      # subscription causes uv to silently fall back to PyPI-only resolution,
      # which could re-resolve a yanked or malicious release that the Safety
      # index would have blocked (e.g. fastapi 0.136.3 / MAL-2026-4750).
      # See docs/reference/dependency-supply-chain.md for the full threat model.
      - name: Assert Safety index is reachable
        id: safety_index
        if: github.actor != 'dependabot[bot]'
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          if [ -z "${SAFETY_API_KEY}" ]; then
            echo "::error::SAFETY_API_KEY secret is not set. uv lock would fall back to PyPI-only resolution, risking re-resolution of yanked/malicious releases. Set the secret and re-run."
            exit 1
          fi
          SAFETY_INDEX_URL="https://pkgs.safetycli.com/repository/po4yka/project/ratatoskr/pypi/simple/"
          set +e
          HTTP_STATUS=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --user "${SAFETY_API_KEY}:" \
            "${SAFETY_INDEX_URL}")
          CURL_EXIT=$?
          set -e
          if [ "${CURL_EXIT}" -ne 0 ]; then
            echo "::warning::Safety index probe failed after retries (curl exit ${CURL_EXIT}). Skipping automated lock refresh for this push; ci.yml still validates committed lockfile drift."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${HTTP_STATUS}" = "401" ] || [ "${HTTP_STATUS}" = "403" ]; then
            echo "::error::Safety index returned HTTP ${HTTP_STATUS}. The subscription may have lapsed or the key may be invalid. Aborting to prevent PyPI-only fallback resolution."
            exit 1
          fi
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::warning::Safety index returned HTTP ${HTTP_STATUS} after retries. Skipping automated lock refresh for this push; ci.yml still validates committed lockfile drift."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "Safety index reachable (HTTP ${HTTP_STATUS}). Proceeding with uv lock."

      - name: Note Dependabot lock refresh without Safety index
        if: github.actor == 'dependabot[bot]'
        run: echo "::warning::SAFETY_API_KEY is not available to this Dependabot-triggered workflow; relying on pyproject exclusions and exported requirements guards for this lock refresh."

      - name: Refresh uv.lock
        if: github.actor == 'dependabot[bot]' || steps.safety_index.outputs.available == 'true'
        run: uv lock

      # Use the same `uv export --no-dev` invocation as ci.yml's prepare-environment
      # job and the Makefile `lock-uv` target. `uv pip compile` re-resolves from
      # pyproject.toml (a different resolution strategy), which historically
      # produced different output than `uv export` and triggered false
      # lockfile-drift alerts on the next push.
      - name: Export locked requirements (runtime)
        if: github.actor == 'dependabot[bot]' || steps.safety_index.outputs.available == 'true'
        run: uv export --no-dev --format requirements-txt -p 3.13 -o requirements.txt

      - name: Export locked requirements (dev)
        if: github.actor == 'dependabot[bot]' || steps.safety_index.outputs.available == 'true'
        run: uv export --only-group dev --no-hashes --format requirements-txt -p 3.13 -o requirements-dev.txt

      - name: Export locked requirements (all extras)
        if: github.actor == 'dependabot[bot]' || steps.safety_index.outputs.available == 'true'
        run: |
          uv export --no-dev --no-hashes --format requirements-txt -p 3.13 \
            --extra api \
            --extra ml \
            --extra youtube \
            --extra export \
            --extra scheduler \
            --extra mcp \
            --extra graph \
            -o requirements-all.txt

      - name: Check for changes
        id: changes
        if: github.actor == 'dependabot[bot]' || steps.safety_index.outputs.available == 'true'
        run: |
          if git diff --quiet uv.lock requirements.txt requirements-dev.txt requirements-all.txt; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No lockfile changes detected"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Lockfile changes detected"
          fi

      # Prefer a personal access token if provided, since some repos block GITHUB_TOKEN PRs
      - name: Create Pull Request (using PAT if provided)
        if: steps.changes.outputs.changes == 'true' && env.ACTIONS_PR_TOKEN != ''
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ env.ACTIONS_PR_TOKEN }}
          commit-message: "chore(lock): update requirements via uv export"
          title: "chore(lock): update requirements"
          body: |
            Automated lockfile refresh from pyproject.toml.

            - Updated `uv.lock` with `uv lock`.
            - Updated requirements.txt, requirements-dev.txt, and requirements-all.txt using `uv export`.
          branch: chore/update-locks
          delete-branch: true
          labels: dependencies, automated pr
          add-paths: |
            uv.lock
            requirements.txt
            requirements-dev.txt
            requirements-all.txt

      - name: Create Pull Request (best-effort with GITHUB_TOKEN)
        if: steps.changes.outputs.changes == 'true' && (env.ACTIONS_PR_TOKEN == '')
        id: cpr_fallback
        continue-on-error: true
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore(lock): update requirements via uv export"
          title: "chore(lock): update requirements"
          body: |
            Automated lockfile refresh from pyproject.toml.

            - Updated `uv.lock` with `uv lock`.
            - Updated requirements.txt, requirements-dev.txt, and requirements-all.txt using `uv export`.
          branch: chore/update-locks
          delete-branch: true
          labels: dependencies, automated pr
          add-paths: |
            uv.lock
            requirements.txt
            requirements-dev.txt
            requirements-all.txt

      - name: Note PR permission restriction
        if: steps.changes.outputs.changes == 'true' && (env.ACTIONS_PR_TOKEN == '')
        run: |
          echo "::warning::Repository blocks GitHub Actions from creating PRs."
          echo "Set a repo/org secret 'ACTIONS_PR_TOKEN' with 'contents' and 'pull_requests' write permissions (fine-grained PAT), or enable the setting to allow Actions to create PRs."

      - name: Enable auto-merge for lockfile PR
        if: steps.changes.outputs.changes == 'true' && steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: No changes detected
        if: steps.changes.outputs.changes == 'false'
        run: echo "Lockfiles are up to date, no PR needed"

      - name: Lock refresh skipped
        if: github.actor != 'dependabot[bot]' && steps.safety_index.outputs.available == 'false'
        run: echo "::warning::Safety index was unavailable after retries, so this run skipped lockfile refresh. The main CI workflow remains responsible for committed lock drift validation."
