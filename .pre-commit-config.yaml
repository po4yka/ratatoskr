default_language_version:
  python: python3.13
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile=black"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        additional_dependencies: []
        args:
          - --cache-dir=.mypy_cache/pre-commit
          - --pretty
          - --show-error-codes
          - --ignore-missing-imports
          - --no-warn-unused-ignores

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.1
    hooks:
      - id: markdownlint-cli2
        name: Lint Markdown files
        args: ["--fix"]

  - repo: local
    hooks:
      - id: class-loc-limit
        name: Disallow classes > 1000 LOC
        entry: python tools/scripts/check_class_size.py --max-loc 1000 --baseline tools/scripts/class_size_baseline.json
        language: python
        types: [python]
      - id: file-loc-limit
        name: Disallow files > 1500 LOC
        entry: python tools/scripts/check_file_size.py --max-loc 1500 --baseline tools/scripts/file_size_baseline.json
        language: python
        types: [python]
      - id: semgrep-mutability
        name: Semgrep Python mutability rules
        entry: semgrep --config semgrep/python-mutability.yml --error app/ tests/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: semgrep-bare-except
        name: Semgrep Python bare-except rules
        entry: semgrep --config semgrep/python-bare-except.yml --error app/ tests/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
