# Ratatoskr operational config.
#
# Convention (post env/YAML refactor):
#   .env carries SECRETS ONLY (API keys, tokens, JWT, DB credentials, PII).
#   Every other tunable lives here. The YAML file is the source of truth on
#   disk: non-secret YAML values override matching env vars at startup.
#
# Loaded by `app/config/config_file.py:load_ratatoskr_yaml`. Section names
# match Pydantic submodel attributes on `Settings`; field names match the
# Pydantic field names within each section. Validation aliases (UPPER_SNAKE
# env-var names) are mapped automatically.
#
# To override a value on a specific host without editing the committed file,
# set the corresponding env var on that host. Env vars only win for fields
# marked `json_schema_extra=SECRET_MARKER` (see app/config/_secret_marker.py).
# Trying to put a secret here is harmless: the loader drops the key with a
# `yaml_secret_keys_ignored` warning at startup.

runtime:
  log_level: INFO
  preferred_lang: auto
  debug_payloads: true
  # NOTE: TEXTACY_ENABLED is hardcoded per-service in docker-compose
  # (worker + mobile-api set 1) so it's intentionally NOT in YAML — moving
  # it here would broadcast a single value across services that need
  # different settings. Same for REDIS_ENABLED below.
  request_timeout_sec: 60
  llm_call_timeout_sec: 720
  llm_per_model_timeout_overrides:
    deepseek/deepseek-v3.2: 180
    deepseek/deepseek-v4-pro: 180
  max_concurrent_calls: 4
  rate_limit_max_concurrent: 2
  # Worker handoff knobs (Tier 2 of the URL-processing speedup plan).
  # Set url_worker_enqueue_enabled to false to fall back to the legacy
  # inline bot path without redeploying (safety valve).
  #
  # FLIPPED TO FALSE 2026-05-25 after discovering the worker silently
  # fails to import `app/tasks/url_processing.py` (forward-ref
  # NameError on URLProcessingTaskRuntime, swallowed by taskiq).
  # Submitted URLs would queue but never run. Re-enable once the
  # url_processing import is fixed.
  url_worker_enqueue_enabled: false
  url_worker_concurrency: 4

openrouter:
  # Model selection has NO code default. Each of these keys is REQUIRED: the bot
  # hard-fails at startup if any is missing, so this file is the single source of
  # truth for which models the service uses. See
  # docs/reference/environment-variables.md (OpenRouter model selection).
  model: qwen/qwen3.5-flash-02-23
  fallback_models:
    - qwen/qwen3.5-plus-02-15
    - deepseek/deepseek-v3.2
    - deepseek/deepseek-v4-pro
    - moonshotai/kimi-k2.5
  # Lightweight/fast path (used for cheap classification + flash summarization).
  flash_model: qwen/qwen3.6-flash
  flash_fallback_models:
    - qwen/qwen3.6-plus-04-02
  # Routed to for very large inputs (see runtime long-context threshold).
  long_context_model: minimax/minimax-m2
  http_referer: https://github.com/po4yka/bite-size-reader
  x_title: Bite-Size Reader

telegram:
  api_base_url: https://bitsizereaderapi.po4yka.com

database:
  pool_size: 5
  max_overflow: 3

redis:
  # NOTE: REDIS_ENABLED is hardcoded per-service in docker-compose (worker,
  # mobile-api, scheduler all set it to 1) so it's intentionally NOT in YAML.
  # The legacy .env had REDIS_ENABLED=0 set for the bot; that line is dropped
  # in Pass 2 of the env/YAML refactor — the bot picks up the field's default
  # (false) when nothing in env or compose overrides it.
  required: false

auth:
  secret_login_enabled: true

digest:
  enabled: true
  digest_times: "10:00,19:00"
  timezone: Asia/Tbilisi

github:
  llm_concurrency: 1
  sync_batch_size: 20

vector_reconcile:
  cron: "0 */6 * * *"
  batch_size: 25

scraper:
  profile: fast
  browser_enabled: false
  scrapling_stealth_fallback: false
  crawl4ai_enabled: false
  defuddle_enabled: false
  cloakbrowser_enabled: false
  playwright_enabled: false
  crawlee_enabled: false
  # Self-hosted Firecrawl sidecar (firecrawl-api on the Pi) is the
  # browser-capable rung of the chain. Required for habr.com and other
  # JS-rendered SPAs where Scrapling fetches HTTP 200 but trafilatura
  # extracts 0 chars from the JS shell. The managed cloud Firecrawl
  # is not wired into the chain — only the self-hosted instance is used.
  firecrawl_self_hosted_enabled: true
  # JS-heavy hosts: the chain reorders browser tier ahead of free for
  # these so the slow-but-correct provider runs first. CSV.
  js_heavy_hosts: techradar.com,habr.com
  # Race providers within each tier (free, paid, browser) instead of trying
  # them serially. Free tier (scrapling/defuddle/direct_html/crawl4ai) is
  # the high-leverage race; Firecrawl stays serial to avoid burning the
  # billed call when a free provider would have won; browser providers
  # race only inside their own tier. Flip to false to restore the legacy
  # ordered-fallback if a provider misbehaves under cancellation.
  race_enabled: true

attachment:
  # Vision-model selection has NO code default. Both keys are REQUIRED; the bot
  # hard-fails at startup if either is missing. This file is the single source of
  # truth for the vision models used on image / scanned-PDF attachments.
  vision_model: qwen/qwen3-vl-32b-instruct
  vision_fallback_models:
    - moonshotai/kimi-k2.5
  # Image-density gate on vision-model routing for HTML articles.
  # Default in code is 1 (any image routes to vision); on the Pi this is
  # too aggressive — Habr-class articles ship a single OG header image,
  # which forces the slow qwen3-vl-32b-instruct path and then truncates
  # the JSON contract, slow-burning the request for ~12 min.
  # Threshold of 3 keeps vision for genuinely image-rich content.
  article_vision_min_images: 3
  # Role-aware pre-filter for the image list that feeds the count gate
  # above. With this on, decorative header images (og:image/ogImage) and
  # small thumbnails are dropped whenever the article has at least one
  # content-area image, so articles with only an OG header take the text
  # path even if article_vision_min_images is set to 1. If no
  # content-area image is available, decorative candidates are kept so
  # the article still has a chance at vision routing.
  vision_routing_role_filter_enabled: true
