<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ratatoskr Quick Save</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Ratatoskr</h1>
        <button id="logoutButton" type="button" title="Clear session">Sign out</button>
      </header>

      <section id="status" role="status" aria-live="polite"></section>

      <section class="panel">
        <label for="apiBaseUrl">API URL</label>
        <input id="apiBaseUrl" type="url" placeholder="http://127.0.0.1:18000" autocomplete="url">
      </section>

      <form id="loginForm" class="panel">
        <label for="identifier">Nickname or email</label>
        <input id="identifier" type="text" autocomplete="username">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password">
        <label class="row">
          <input id="rememberMe" type="checkbox">
          <span>Remember refresh session</span>
        </label>
        <button type="submit">Sign in</button>
      </form>

      <form id="saveForm" class="panel" hidden>
        <label for="pageTitle">Title</label>
        <input id="pageTitle" type="text">
        <label for="tags">Tags</label>
        <input id="tags" type="text" placeholder="reading, research">
        <label class="row">
          <input id="summarize" type="checkbox" checked>
          <span>Summarize after saving</span>
        </label>
        <button id="saveButton" type="submit">Save Current Tab</button>
      </form>

      <section class="panel queue">
        <div>
          <strong>Offline queue</strong>
          <span id="queueCount">0</span>
        </div>
        <button id="retryButton" type="button">Retry</button>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
