# Caching DNS resolver sidecar for the Pi deployment (ratatoskr-dnsmasq).
#
# Why: the Pi's Docker embedded resolver (127.0.0.11) drops a large share of
# *concurrent* DNS queries under load with EAI_AGAIN ("Temporary failure in
# name resolution"), which aborted scraper requests before any provider ran ->
# spurious "No Content Found" (a 30-way concurrent getaddrinfo burst failed
# ~60%, sequential lookups 0%).
#
# Topology: this dnsmasq is the FIRST external upstream (ExtServer) of every app
# container's embedded resolver (see `dns:` in docker-compose.pi.yml). The
# embedded resolver still resolves Docker service names (postgres / redis /
# firecrawl-api) locally and forwards only EXTERNAL queries here. dnsmasq caches
# answers and coalesces in-flight duplicates, and a local cache hit returns in
# microseconds instead of a round trip to 1.1.1.1 -- so 127.0.0.11 clears each
# forward fast and stops backing up (and dropping) under concurrency. Service
# discovery is untouched: dnsmasq never sees single-label service names, and the
# `dns:` list keeps 1.1.1.1/8.8.8.8 as fallbacks so a dnsmasq outage degrades to
# direct public DNS rather than breaking resolution.

# Upstream = this container's OWN Docker embedded resolver (127.0.0.11), which
# reaches the internet via the host network namespace. Direct container egress to
# public resolvers (1.1.1.1:53) is NOT routable on this Pi, so dnsmasq relays
# through 127.0.0.11; the win is dnsmasq's cache + in-flight dedup sitting in
# front of it, absorbing repeated/concurrent external lookups locally. `no-resolv`
# keeps dnsmasq from also picking 127.0.0.11 up from its own resolv.conf twice.
no-resolv
server=127.0.0.11

# Cache aggressively -- the bot/worker re-resolve the same hosts constantly
# (OpenRouter, GitHub, arXiv, RSS feeds, re-summarized articles).
cache-size=10000

# Allow many concurrent in-flight forwards (default 150) so a scrape burst is
# never queued behind the cap.
dns-forward-max=1500

# Never cache negative answers: a transient upstream SERVFAIL/timeout must not be
# remembered as "does not exist" for a host that is actually fine.
no-negcache

# DNS-rebinding / SSRF defense (MEDIUM-001): reject upstream answers that map a
# PUBLIC hostname to a private/loopback/link-local IP. This closes the
# DNS-rebinding TOCTOU window at the DNS layer for EVERY component that resolves
# external hosts through this sidecar -- crawlee, Playwright/Chromium, git
# clone, and httpx -- not only the IP-pinning SafeAsyncTransport httpx path.
# Docker service names are single-label and resolved by the embedded resolver,
# so service discovery (postgres/redis/firecrawl) is untouched. The cloud
# metadata endpoint 169.254.169.254 is link-local and is therefore blocked.
# Note: localhost answers are intentionally NOT exempted (no rebind-localhost-ok)
# so 127.0.0.1 rebinds are also rejected. For deployments that do not route
# external DNS through this sidecar, the application-layer SafeAsyncTransport
# remains the primary SSRF control for httpx paths.
stop-dns-rebind
