# Local-development compose overlay -- OPT-IN, never used on the Pi.
#
# The base docker-compose.yml deliberately does NOT bind-mount the app code,
# alembic.ini, or config/: bind mounts shadow the content baked into the
# image, which made `make pi-deploy` ship images that never actually ran (see
# the volumes note in docker-compose.yml). For the Pi the image is the single
# source of truth.
#
# This overlay re-adds source and config bind mounts so local development gets
# edit-and-restart hot-reload without an image rebuild. Use it explicitly:
#
#   docker compose \
#     -f ops/docker/docker-compose.yml \
#     -f ops/docker/docker-compose.dev.yml \
#     up -d ratatoskr
#
# Do NOT combine this with docker-compose.pi.yml.

services:
  ratatoskr:
    volumes:
      - ../../app:/app/app:ro
      - ../../bot.py:/app/bot.py:ro
      - ../../alembic.ini:/app/alembic.ini:ro
      - ../../config:/app/config:ro

  mobile-api:
    volumes:
      - ../../app:/app/app:ro
      - ../../bot.py:/app/bot.py:ro
      - ../../alembic.ini:/app/alembic.ini:ro
      - ../../config:/app/config:ro

  worker:
    volumes:
      - ../../app:/app/app:ro
      - ../../bot.py:/app/bot.py:ro
      - ../../alembic.ini:/app/alembic.ini:ro
      - ../../config:/app/config:ro

  scheduler:
    volumes:
      - ../../app:/app/app:ro
      - ../../alembic.ini:/app/alembic.ini:ro
      - ../../config:/app/config:ro

  migrate:
    volumes:
      - ../../app:/app/app:ro
      - ../../alembic.ini:/app/alembic.ini:ro
      - ../../config:/app/config:ro

  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
