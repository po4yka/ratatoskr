# Monitoring stack for Ratatoskr
# Optimized for Raspberry Pi 5 (16GB RAM)
#
# Usage:
#   export GRAFANA_ADMIN_PASSWORD='<strong-password>'
#   docker compose -f ops/docker/docker-compose.monitoring.yml up -d
#
# This creates a lightweight monitoring stack with:
# - Prometheus: Metrics collection (512MB limit, 15-day retention)
# - Alertmanager: Alert routing to a webhook/Slack/Telegram/PagerDuty receiver
# - Grafana: Visualization (256MB limit)
# - Loki: Log aggregation (256MB limit, 7-day retention)
# - Promtail: Log shipping
# - Node Exporter: Host-level metrics for Prometheus
#
# Note: Prometheus needs to reach `mobile-api:8000`; either run both stacks
# under the same Compose project or attach Prometheus to the main app's
# network via an `external: true` entry in this file.

services:
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ratatoskr-alertmanager
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /etc/alertmanager/render-alertmanager-config.sh
    environment:
      - RATATOSKR_ENV=${RATATOSKR_ENV:-development}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-http://127.0.0.1:9/alertmanager-unconfigured}
      - ALERT_SLACK_API_URL=${ALERT_SLACK_API_URL:-}
      - ALERT_TELEGRAM_WEBHOOK_URL=${ALERT_TELEGRAM_WEBHOOK_URL:-}
      - ALERT_PAGERDUTY_ROUTING_KEY=${ALERT_PAGERDUTY_ROUTING_KEY:-}
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../monitoring/render-alertmanager-config.sh:/etc/alertmanager/render-alertmanager-config.sh:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ratatoskr-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus-data:/prometheus
    secrets:
      - metrics_bearer_token
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
    depends_on:
      alertmanager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.2
    container_name: ratatoskr-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in environment}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3001
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.2
    container_name: ratatoskr-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring
    depends_on:
      alertmanager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.2
    container_name: ratatoskr-promtail
    restart: unless-stopped
    volumes:
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ratatoskr-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/credentials)($|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  tempo:
    image: grafana/tempo:2.6.1
    container_name: ratatoskr-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../monitoring/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - grafana

networks:
  monitoring:
    driver: bridge

volumes:
  alertmanager-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  tempo-data:
    driver: local

secrets:
  metrics_bearer_token:
    environment: METRICS_BEARER_TOKEN
