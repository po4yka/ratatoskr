# Pi-specific compose overrides.
#
# Official Qdrant Docker images crash on Raspberry Pi 5 due to a jemalloc
# incompatibility with the 16KB memory page size.  On the Pi, Qdrant is
# built from source and runs as a native systemd service on port 6333.
# This overlay redirects all services to the host-native Qdrant and marks
# the qdrant compose service as optional so the bot starts without it.
# Postgres uses the dedicated ratatoskr-postgres container from the base
# compose file; no Pi-specific shared database override is needed.
#
# The Firecrawl scraper sidecars (firecrawl-api, firecrawl-redis,
# firecrawl-playwright, firecrawl-postgres, firecrawl-rabbitmq) run on the
# Pi as a separate compose project that owns the `firecrawl_internal`
# bridge network.  The bot and mobile-api need to attach to that network
# at recreate-time so DNS for `firecrawl-api:3002` (used by the Firecrawl
# rung of the scraper chain) resolves correctly.  Declared as external so
# this overlay does not own its lifecycle.
#
# Usage (Pi only):
#   docker compose \
#     -f ops/docker/docker-compose.yml \
#     -f ops/docker/docker-compose.pi.yml \
#     up -d ratatoskr mobile-api

services:
  ratatoskr:
    # Serialize A+AAAA DNS queries. Docker's embedded resolver (127.0.0.11)
    # drops a large share of *concurrent* lookups under load with EAI_AGAIN
    # ("Temporary failure in name resolution"), which aborts the scraper SSRF
    # gate before any provider runs -> spurious "No Content Found". glibc sends
    # A+AAAA in parallel on one socket by default; single-request-reopen forces
    # them sequential on a reopened socket, which the embedded resolver handles
    # reliably. Pairs with the bounded-retry hardening in app/security/ssrf.py.
    dns_opt:
      - single-request-reopen
    environment:
      - QDRANT_URL=http://host-gateway:6333
      # Cap glibc malloc arenas (default up to 8*cores) to curb RSS growth on
      # the long-lived async process; Pi-tuning, see CLAUDE.md.
      - MALLOC_ARENA_MAX=2
      - TEXTACY_ENABLED=${TEXTACY_ENABLED:-0}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - SCRAPER_PROFILE=${SCRAPER_PROFILE:-balanced}
      - SCRAPER_BROWSER_ENABLED=${SCRAPER_BROWSER_ENABLED:-false}
      - SCRAPER_SCRAPLING_STEALTH_FALLBACK=${SCRAPER_SCRAPLING_STEALTH_FALLBACK:-true}
      - SCRAPER_CRAWL4AI_ENABLED=${SCRAPER_CRAWL4AI_ENABLED:-false}
      - SCRAPER_DEFUDDLE_ENABLED=${SCRAPER_DEFUDDLE_ENABLED:-false}
      - SCRAPER_CLOAKBROWSER_ENABLED=${SCRAPER_CLOAKBROWSER_ENABLED:-false}
      - SCRAPER_PLAYWRIGHT_ENABLED=${SCRAPER_PLAYWRIGHT_ENABLED:-false}
      - SCRAPER_CRAWLEE_ENABLED=${SCRAPER_CRAWLEE_ENABLED:-false}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-false}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      default: {}
      firecrawl_internal: {}
    depends_on:
      qdrant:
        condition: service_started
        required: false

  worker:
    # Same Docker embedded-DNS concurrency mitigation as the bot (see above):
    # the worker resolves many external hosts (RSS / digest / source ingestion /
    # git-backup) and hits the same EAI_AGAIN drops.
    dns_opt:
      - single-request-reopen
    environment:
      - QDRANT_URL=http://host-gateway:6333
      - MALLOC_ARENA_MAX=2
      - TEXTACY_ENABLED=${TEXTACY_ENABLED:-0}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - TASKIQ_WORKER_CONCURRENCY=${TASKIQ_WORKER_CONCURRENCY:-1}
      - GITHUB_SYNC_LLM_CONCURRENCY=${GITHUB_SYNC_LLM_CONCURRENCY:-1}
      - GITHUB_SYNC_BATCH_SIZE=${GITHUB_SYNC_BATCH_SIZE:-20}
      - VECTOR_RECONCILE_BATCH_SIZE=${VECTOR_RECONCILE_BATCH_SIZE:-25}
      - SCRAPER_PROFILE=${SCRAPER_PROFILE:-balanced}
      - SCRAPER_BROWSER_ENABLED=${SCRAPER_BROWSER_ENABLED:-false}
      - SCRAPER_SCRAPLING_STEALTH_FALLBACK=${SCRAPER_SCRAPLING_STEALTH_FALLBACK:-true}
      - SCRAPER_CRAWL4AI_ENABLED=${SCRAPER_CRAWL4AI_ENABLED:-false}
      - SCRAPER_DEFUDDLE_ENABLED=${SCRAPER_DEFUDDLE_ENABLED:-false}
      - SCRAPER_CLOAKBROWSER_ENABLED=${SCRAPER_CLOAKBROWSER_ENABLED:-false}
      - SCRAPER_PLAYWRIGHT_ENABLED=${SCRAPER_PLAYWRIGHT_ENABLED:-false}
      - SCRAPER_CRAWLEE_ENABLED=${SCRAPER_CRAWLEE_ENABLED:-false}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-false}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      default: {}
      firecrawl_internal: {}
    depends_on:
      qdrant:
        condition: service_started
        required: false

  mobile-api:
    environment:
      - QDRANT_URL=http://host-gateway:6333
      - MALLOC_ARENA_MAX=2
      - TEXTACY_ENABLED=${TEXTACY_ENABLED:-0}
      - API_WORKERS=${API_WORKERS:-1}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - SCRAPER_PROFILE=${SCRAPER_PROFILE:-balanced}
      - SCRAPER_BROWSER_ENABLED=${SCRAPER_BROWSER_ENABLED:-false}
      - SCRAPER_SCRAPLING_STEALTH_FALLBACK=${SCRAPER_SCRAPLING_STEALTH_FALLBACK:-true}
      - SCRAPER_CRAWL4AI_ENABLED=${SCRAPER_CRAWL4AI_ENABLED:-false}
      - SCRAPER_DEFUDDLE_ENABLED=${SCRAPER_DEFUDDLE_ENABLED:-false}
      - SCRAPER_CLOAKBROWSER_ENABLED=${SCRAPER_CLOAKBROWSER_ENABLED:-false}
      - SCRAPER_PLAYWRIGHT_ENABLED=${SCRAPER_PLAYWRIGHT_ENABLED:-false}
      - SCRAPER_CRAWLEE_ENABLED=${SCRAPER_CRAWLEE_ENABLED:-false}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-false}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      default: {}
      firecrawl_internal: {}
    depends_on:
      qdrant:
        condition: service_started
        required: false

  mcp:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  mcp-write:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  mcp-public:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  qdrant:
    # Assign to a profile that is never activated so this service is excluded
    # when running with the Pi overlay.  The depends_on entries above use
    # required: false so dependents start even when this service is absent.
    profiles:
      - disabled-on-pi

  postgres:
    platform: linux/arm64

networks:
  firecrawl_internal:
    external: true
  # Pin the default network to a stable name so the bot, mobile-api, postgres,
  # redis, and qdrant all attach to the same bridge regardless of compose
  # project name. Without this, recreating the bot via `compose -p docker up`
  # could land it on a fresh `_default` network where DNS for `postgres` /
  # `redis` doesn't resolve. Letting compose own lifecycle (no `external: true`)
  # keeps fresh-Pi deploys working — compose creates `docker_default` on first
  # run, reuses it thereafter.
  default:
    name: docker_default
