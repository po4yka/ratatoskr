# Pi-specific compose overrides.
#
# Official Qdrant Docker images crash on Raspberry Pi 5 due to a jemalloc
# incompatibility with the 16KB memory page size.  On the Pi, Qdrant is
# built from source and runs as a native systemd service on port 6333.
# This overlay redirects all services to the host-native Qdrant and marks
# the qdrant compose service as optional so the bot starts without it.
# Postgres uses the dedicated ratatoskr-postgres container from the base
# compose file; no Pi-specific shared database override is needed.
#
# The Firecrawl scraper sidecars (firecrawl-api, firecrawl-redis,
# firecrawl-playwright, firecrawl-postgres, firecrawl-rabbitmq) run on the
# Pi as a separate compose project that owns the `firecrawl_internal`
# bridge network.  The bot and mobile-api need to attach to that network
# at recreate-time so DNS for `firecrawl-api:3002` (used by the Firecrawl
# rung of the scraper chain) resolves correctly.  Declared as external so
# this overlay does not own its lifecycle.
#
# Usage (Pi only):
#   docker compose \
#     -f ops/docker/docker-compose.yml \
#     -f ops/docker/docker-compose.pi.yml \
#     up -d ratatoskr mobile-api

services:
  # Caching DNS resolver sidecar. Sits as the bot/worker's FIRST external DNS
  # upstream so concurrent external lookups are cached + coalesced locally
  # instead of hammering (and being dropped by) Docker's embedded resolver
  # 127.0.0.11. Pure enhancement: the `dns:` lists keep 1.1.1.1/8.8.8.8 as
  # fallbacks, and service-name discovery never touches dnsmasq. See
  # ops/docker/dnsmasq.conf for the full rationale.
  dnsmasq:
    image: 4km3/dnsmasq@sha256:52e25fb2601156ab66f6a0872c180b285df7cafaa41267d8d65689f066490641
    container_name: ratatoskr-dnsmasq
    restart: unless-stopped
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro
    networks:
      dns_net:
        ipv4_address: 10.224.0.2
    healthcheck:
      test: ["CMD-SHELL", "nslookup example.com 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  ratatoskr:
    # Serialize A+AAAA DNS queries. Docker's embedded resolver (127.0.0.11)
    # drops a large share of *concurrent* lookups under load with EAI_AGAIN
    # ("Temporary failure in name resolution"), which aborts the scraper SSRF
    # gate before any provider runs -> spurious "No Content Found". glibc sends
    # A+AAAA in parallel on one socket by default; single-request-reopen forces
    # them sequential on a reopened socket, which the embedded resolver handles
    # reliably. Pairs with the bounded-retry hardening in app/security/ssrf.py.
    dns_opt:
      - single-request-reopen
    # Forward external DNS through the caching dnsmasq sidecar first; keep
    # 1.1.1.1/8.8.8.8 as fallbacks. !override replaces the base dns: list --
    # compose otherwise APPENDS, which would bury dnsmasq behind 1.1.1.1.
    dns: !override
      - 10.224.0.2
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - QDRANT_URL=http://host-gateway:6333
      # Cap glibc malloc arenas (default up to 8*cores) to curb RSS growth on
      # the long-lived async process; Pi-tuning, see CLAUDE.md.
      - MALLOC_ARENA_MAX=2
      - TEXTACY_ENABLED=${TEXTACY_ENABLED:-0}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - SCRAPER_PROFILE=${SCRAPER_PROFILE:-balanced}
      - SCRAPER_BROWSER_ENABLED=${SCRAPER_BROWSER_ENABLED:-true}
      - SCRAPER_SCRAPLING_STEALTH_FALLBACK=${SCRAPER_SCRAPLING_STEALTH_FALLBACK:-true}
      - SCRAPER_CRAWL4AI_ENABLED=${SCRAPER_CRAWL4AI_ENABLED:-true}
      - SCRAPER_DEFUDDLE_ENABLED=${SCRAPER_DEFUDDLE_ENABLED:-true}
      - SCRAPER_CLOAKBROWSER_ENABLED=${SCRAPER_CLOAKBROWSER_ENABLED:-true}
      - SCRAPER_PLAYWRIGHT_ENABLED=${SCRAPER_PLAYWRIGHT_ENABLED:-true}
      - SCRAPER_CRAWLEE_ENABLED=${SCRAPER_CRAWLEE_ENABLED:-true}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-false}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      default: {}
      firecrawl_internal: {}
      dns_net: {}
    depends_on:
      # Ensure the caching resolver is created (and claims its static
      # 10.224.0.2) before the bot, so the bot can never squat that IP and
      # leave a dead DNS first-hop. service_started (not _healthy) keeps
      # dnsmasq a pure enhancement -- the dns: list still falls back to
      # 1.1.1.1/8.8.8.8 -- rather than a health-gated single point of failure.
      dnsmasq:
        condition: service_started
      qdrant:
        condition: service_started
        required: false
    # OOM hardening: the base 1 GiB cap (docker-compose.yml) was hit exactly --
    # memcg OOM, exit 137 -- when two concurrent scrapes (MAX_CONCURRENT_CALLS=2)
    # each launched an in-container Chromium alongside the resident embedding
    # model, orphaning the in-flight request. Raise the ceiling here; the Pi host
    # has 15 GiB. Deep-merges over the base deploy block (keeps its cpus limit).
    deploy:
      resources:
        limits:
          memory: 3G

  worker:
    # Same Docker embedded-DNS concurrency mitigation as the bot (see above):
    # the worker resolves many external hosts (RSS / digest / source ingestion /
    # git-backup) and hits the same EAI_AGAIN drops.
    dns_opt:
      - single-request-reopen
    # Forward external DNS through the caching dnsmasq sidecar first (see bot).
    dns: !override
      - 10.224.0.2
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - QDRANT_URL=http://host-gateway:6333
      - MALLOC_ARENA_MAX=2
      - TEXTACY_ENABLED=${TEXTACY_ENABLED:-0}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - TASKIQ_WORKER_PROCESSES=${TASKIQ_WORKER_PROCESSES:-1}
      - TASKIQ_MAX_ASYNC_TASKS_PER_PROCESS=${TASKIQ_MAX_ASYNC_TASKS_PER_PROCESS:-2}
      - GITHUB_SYNC_LLM_CONCURRENCY=${GITHUB_SYNC_LLM_CONCURRENCY:-1}
      - GITHUB_SYNC_BATCH_SIZE=${GITHUB_SYNC_BATCH_SIZE:-20}
      - VECTOR_RECONCILE_BATCH_SIZE=${VECTOR_RECONCILE_BATCH_SIZE:-25}
      - SCRAPER_PROFILE=${SCRAPER_PROFILE:-balanced}
      - SCRAPER_BROWSER_ENABLED=${SCRAPER_BROWSER_ENABLED:-true}
      - SCRAPER_SCRAPLING_STEALTH_FALLBACK=${SCRAPER_SCRAPLING_STEALTH_FALLBACK:-true}
      - SCRAPER_CRAWL4AI_ENABLED=${SCRAPER_CRAWL4AI_ENABLED:-true}
      - SCRAPER_DEFUDDLE_ENABLED=${SCRAPER_DEFUDDLE_ENABLED:-true}
      - SCRAPER_CLOAKBROWSER_ENABLED=${SCRAPER_CLOAKBROWSER_ENABLED:-true}
      - SCRAPER_PLAYWRIGHT_ENABLED=${SCRAPER_PLAYWRIGHT_ENABLED:-true}
      - SCRAPER_CRAWLEE_ENABLED=${SCRAPER_CRAWLEE_ENABLED:-true}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-false}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      default: {}
      firecrawl_internal: {}
      dns_net: {}
    depends_on:
      # Same dnsmasq ordering guarantee as the bot (see above).
      dnsmasq:
        condition: service_started
      qdrant:
        condition: service_started
        required: false

  mobile-api:
    environment:
      - QDRANT_URL=http://host-gateway:6333
      - MALLOC_ARENA_MAX=2
      - TEXTACY_ENABLED=${TEXTACY_ENABLED:-0}
      - API_WORKERS=${API_WORKERS:-1}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus-api
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - STATUS_BOT_METRICS_URL=http://ratatoskr:9101/metrics
      - STATUS_WORKER_METRICS_URL=http://worker:9102/metrics
      - STATUS_SCHEDULER_METRICS_URL=http://scheduler:9103/metrics
      - STATUS_NODE_METRICS_URL=http://node-exporter:9100/metrics
      - STATUS_QDRANT_READY_URL=http://host-gateway:6333/readyz
      - SCRAPER_PROFILE=${SCRAPER_PROFILE:-balanced}
      - SCRAPER_BROWSER_ENABLED=${SCRAPER_BROWSER_ENABLED:-true}
      - SCRAPER_SCRAPLING_STEALTH_FALLBACK=${SCRAPER_SCRAPLING_STEALTH_FALLBACK:-true}
      - SCRAPER_CRAWL4AI_ENABLED=${SCRAPER_CRAWL4AI_ENABLED:-true}
      - SCRAPER_DEFUDDLE_ENABLED=${SCRAPER_DEFUDDLE_ENABLED:-true}
      - SCRAPER_CLOAKBROWSER_ENABLED=${SCRAPER_CLOAKBROWSER_ENABLED:-true}
      - SCRAPER_PLAYWRIGHT_ENABLED=${SCRAPER_PLAYWRIGHT_ENABLED:-true}
      - SCRAPER_CRAWLEE_ENABLED=${SCRAPER_CRAWLEE_ENABLED:-true}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-false}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      default: {}
      firecrawl_internal: {}
    depends_on:
      qdrant:
        condition: service_started
        required: false

  prometheus:
    # The Pi runs Qdrant as a native systemd service rather than a Compose
    # container. Preserve the normal `qdrant:6333` Prometheus target by mapping
    # that name to Docker's host gateway only in this overlay.
    extra_hosts:
      - "qdrant:host-gateway"

  mcp:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  mcp-write:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  mcp-public:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  qdrant:
    # Assign to a profile that is never activated so this service is excluded
    # when running with the Pi overlay.  The depends_on entries above use
    # required: false so dependents start even when this service is absent.
    profiles:
      - disabled-on-pi

  postgres:
    platform: linux/arm64

  pg-backup:
    # A Pi deploy must leave observable recovery evidence immediately instead
    # of waiting until the next 03:00 UTC cron window. The entrypoint starts
    # crond only after this initial dump and its textfile metric succeed, so
    # the base healthcheck is also the deployment gate.
    environment:
      - BACKUP_RUN_ON_START=${BACKUP_RUN_ON_START:-true}

  # Pi 5 (16 GB) drives many distinct domains at once; the base 1.5 GB / 1 CPU
  # floor thrashes Chrome-per-seed here (hung/502 CDP). Raise on the overlay, as
  # the base compose note intends ("the Pi overlay uses more").
  cloakbrowser:
    deploy:
      resources:
        limits:
          memory: 2560M
          cpus: "2.0"

networks:
  firecrawl_internal:
    external: true
  # Pin the default network to a stable name so the bot, mobile-api, postgres,
  # redis, and qdrant all attach to the same bridge regardless of compose
  # project name. Without this, recreating the bot via `compose -p docker up`
  # could land it on a fresh `_default` network where DNS for `postgres` /
  # `redis` doesn't resolve. Letting compose own lifecycle (no `external: true`)
  # keeps fresh-Pi deploys working — compose creates `docker_default` on first
  # run, reuses it thereafter.
  default:
    name: docker_default
  # Tiny isolated bridge carrying DNS traffic between the app containers and the
  # dnsmasq sidecar (static IP 10.224.0.2). /29 = 6 usable addresses; 10.224/29
  # is well clear of the existing 172.x / 192.168.x Docker subnets.
  dns_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.224.0.0/29
