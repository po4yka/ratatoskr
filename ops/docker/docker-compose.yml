services:
  migrate:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    container_name: ratatoskr-migrate
    init: true
    command: ["python", "-m", "app.cli.migrate_db"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://ratatoskr_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ratatoskr}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - RATATOSKR_PROCESS_ROLE=migrate
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  ratatoskr:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    container_name: ratatoskr-bot
    init: true
    env_file:
      - path: ../../.env
        required: false
    volumes:
      # App code, alembic.ini, and config/ are baked into the image. Do NOT
      # bind-mount ../../app, ../../bot.py, ../../alembic.ini, or ../../config
      # here: bind mounts silently shadow the shipped image, so `make pi-deploy`
      # would build/ship a new image that never actually runs. For local
      # hot-reload and config overrides, use the dev overlay explicitly:
      #   docker compose -f ops/docker/docker-compose.yml \
      #                  -f ops/docker/docker-compose.dev.yml up -d ratatoskr
      - ${X_HOST_DATA_DIR:-/var/lib/x_bookmarks_stub}:/x_bookmarks:ro
      - ../../data:/data
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    environment:
      - TEXTACY_ENABLED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://ratatoskr_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ratatoskr}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_ENABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-4}
      - REQUEST_TIMEOUT_SEC=${REQUEST_TIMEOUT_SEC:-60}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-0}
      - FIRECRAWL_SELF_HOSTED_URL=${FIRECRAWL_SELF_HOSTED_URL:-http://firecrawl-api:3002}
      - SCRAPER_DEFUDDLE_API_BASE_URL=${SCRAPER_DEFUDDLE_API_BASE_URL:-http://defuddle-api:3003}
      - SCRAPER_CRAWL4AI_URL=${SCRAPER_CRAWL4AI_URL:-http://crawl4ai:11235}
      - SCRAPER_CLOAKBROWSER_URL=${SCRAPER_CLOAKBROWSER_URL:-http://cloakbrowser:9222}
      - SCRAPER_CLOAKBROWSER_HUMANIZE=${SCRAPER_CLOAKBROWSER_HUMANIZE:-true}
      - SCRAPER_CLOAKBROWSER_PROXY=${SCRAPER_CLOAKBROWSER_PROXY:-}
      # Auth token forwarded to defuddle sidecar — empty by default (auth is opt-in)
      - SCRAPER_DEFUDDLE_TOKEN=${DEFUDDLE_AUTH_TOKEN:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.3}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
      - X_IDEAS_PATH=${X_IDEAS_PATH:-/x_bookmarks/ideas}
      - RATATOSKR_PROCESS_ROLE=bot
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.75"
        reservations:
          memory: 512M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "python", "-m", "app.cli.healthcheck"]
      interval: 30s
      # Cold healthcheck has to spin up the Python interpreter, import
      # FastAPI/SQLAlchemy/asyncpg, run an Alembic plugin scan, and ping
      # Postgres. On a Pi 5 this measures ~15 s for mobile-api and ~3 s
      # for the bot; 30 s gives sufficient headroom over the prior 10 s
      # ceiling that produced spurious "unhealthy" verdicts post-cutover.
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      # only enforced when --profile with-scrapers is active
      crawl4ai:
        condition: service_healthy
        required: false
      defuddle-api:
        condition: service_healthy
        required: false
      cloakbrowser:
        condition: service_healthy
        required: false
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  worker:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    container_name: ratatoskr-worker
    init: true
    command:
      - taskiq
      - worker
      - "app.tasks.broker:broker"
      - app.tasks.digest
      - app.tasks.rss
      - app.tasks.github_sync
      - app.tasks.reconcile_vector_index
      - app.tasks.import_tasks
      - app.tasks.x_bookmarks_sync
      - app.tasks.x_wiki_sync
      - "--workers"
      - "${TASKIQ_WORKER_CONCURRENCY:-4}"
    env_file:
      - path: ../../.env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://ratatoskr_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ratatoskr}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_ENABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEXTACY_ENABLED=1
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-4}
      - REQUEST_TIMEOUT_SEC=${REQUEST_TIMEOUT_SEC:-60}
      - FIRECRAWL_SELF_HOSTED_ENABLED=${FIRECRAWL_SELF_HOSTED_ENABLED:-0}
      - FIRECRAWL_SELF_HOSTED_URL=${FIRECRAWL_SELF_HOSTED_URL:-http://firecrawl-api:3002}
      - SCRAPER_DEFUDDLE_API_BASE_URL=${SCRAPER_DEFUDDLE_API_BASE_URL:-http://defuddle-api:3003}
      - SCRAPER_CRAWL4AI_URL=${SCRAPER_CRAWL4AI_URL:-http://crawl4ai:11235}
      - SCRAPER_CLOAKBROWSER_URL=${SCRAPER_CLOAKBROWSER_URL:-http://cloakbrowser:9222}
      - SCRAPER_CLOAKBROWSER_HUMANIZE=${SCRAPER_CLOAKBROWSER_HUMANIZE:-true}
      - SCRAPER_CLOAKBROWSER_PROXY=${SCRAPER_CLOAKBROWSER_PROXY:-}
      - SCRAPER_DEFUDDLE_TOKEN=${DEFUDDLE_AUTH_TOKEN:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.3}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
      - RATATOSKR_PROCESS_ROLE=worker
    volumes:
      - ${X_HOST_DATA_DIR:-/var/lib/x_bookmarks_stub}:/x_bookmarks:ro
      - ../../data:/data
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
        required: false
      defuddle-api:
        condition: service_healthy
        required: false
      cloakbrowser:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('redis', 6379), 5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.75"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 60s

  scheduler:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    container_name: ratatoskr-scheduler
    init: true
    command:
      - taskiq
      - scheduler
      - "app.tasks.scheduler:scheduler"
      - "--skip-first-run"
    environment:
      # DATABASE_URL intentionally absent: scheduler only enqueues to Redis; workers own DB access.
      - REDIS_ENABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DIGEST_ENABLED=${DIGEST_ENABLED:-false}
      - GITHUB_SYNC_ENABLED=${GITHUB_SYNC_ENABLED:-true}
      - GITHUB_SYNC_CRON=${GITHUB_SYNC_CRON:-0 2 * * *}
      - VECTOR_RECONCILE_ENABLED=${VECTOR_RECONCILE_ENABLED:-true}
      - VECTOR_RECONCILE_CRON=${VECTOR_RECONCILE_CRON:-*/30 * * * *}
      - X_BOOKMARKS_SYNC_ENABLED=${X_BOOKMARKS_SYNC_ENABLED:-false}
      - X_BOOKMARKS_SYNC_CRON=${X_BOOKMARKS_SYNC_CRON:-*/15 * * * *}
      - X_WIKI_SYNC_CRON=${X_WIKI_SYNC_CRON:-0 * * * *}
      - X_WIKI_LIBRARY_PATH=${X_WIKI_LIBRARY_PATH:-/x_bookmarks/library}
      - X_IDEAS_PATH=${X_IDEAS_PATH:-/x_bookmarks/ideas}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
      - RATATOSKR_PROCESS_ROLE=scheduler
    volumes:
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('redis', 6379), 5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
        reservations:
          memory: 64M
          cpus: "0.05"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  mobile-api:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.api
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    container_name: ratatoskr-mobile-api
    init: true
    tmpfs:
      - /tmp
    env_file:
      - path: ../../.env
        required: false
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=${API_WORKERS:-1}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://ratatoskr_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ratatoskr}
      - QDRANT_URL=http://qdrant:6333
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.3}
      - REDIS_ENABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - SCRAPER_DEFUDDLE_API_BASE_URL=${SCRAPER_DEFUDDLE_API_BASE_URL:-http://defuddle-api:3003}
      - SCRAPER_CRAWL4AI_URL=${SCRAPER_CRAWL4AI_URL:-http://crawl4ai:11235}
      - SCRAPER_CLOAKBROWSER_URL=${SCRAPER_CLOAKBROWSER_URL:-http://cloakbrowser:9222}
      - SCRAPER_CLOAKBROWSER_HUMANIZE=${SCRAPER_CLOAKBROWSER_HUMANIZE:-true}
      - SCRAPER_CLOAKBROWSER_PROXY=${SCRAPER_CLOAKBROWSER_PROXY:-}
      # Auth token forwarded to defuddle sidecar — empty by default (auth is opt-in)
      - SCRAPER_DEFUDDLE_TOKEN=${DEFUDDLE_AUTH_TOKEN:-}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
    volumes:
      # App code, alembic.ini, and config/ are baked into the image -- see the
      # note on the ratatoskr service above.
      - ../../data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:18000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      # only enforced when --profile with-scrapers is active
      crawl4ai:
        condition: service_healthy
        required: false
      defuddle-api:
        condition: service_healthy
        required: false
      cloakbrowser:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "app.cli.healthcheck"]
      interval: 30s
      # Cold healthcheck has to spin up the Python interpreter, import
      # FastAPI/SQLAlchemy/asyncpg, run an Alembic plugin scan, and ping
      # Postgres. On a Pi 5 this measures ~15 s for mobile-api and ~3 s
      # for the bot; 30 s gives sufficient headroom over the prior 10 s
      # ceiling that produced spurious "unhealthy" verdicts post-cutover.
      timeout: 30s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "0.30"
  mcp:
    profiles:
      - mcp
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    container_name: ratatoskr-mcp
    init: true
    env_file:
      - path: ../../.env
        required: false
    environment:
      - MCP_ENABLED=true
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8200
      - MCP_USER_ID=${MCP_USER_ID:-}
      - MCP_ALLOW_REMOTE_SSE=true
      - DB_PATH=/data/ratatoskr.db
      - QDRANT_URL=http://qdrant:6333
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
      - RATATOSKR_PROCESS_ROLE=mcp
    volumes:
      - ${X_HOST_DATA_DIR:-/var/lib/x_bookmarks_stub}:/x_bookmarks:ro
      - ../../data:/data:ro
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    command: ["python", "-m", "app.cli.mcp_server"]
    ports:
      - "127.0.0.1:8200:8200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8200),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
        reservations:
          memory: 128M
          cpus: "0.10"
  mcp-write:
    profiles:
      - mcp-write
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    container_name: ratatoskr-mcp-write
    init: true
    env_file:
      - path: ../../.env
        required: false
    environment:
      - MCP_ENABLED=true
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8200
      - MCP_USER_ID=${MCP_USER_ID:-}
      - MCP_ALLOW_REMOTE_SSE=true
      - DB_PATH=/data/ratatoskr.db
      - QDRANT_URL=http://qdrant:6333
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ${X_HOST_DATA_DIR:-/var/lib/x_bookmarks_stub}:/x_bookmarks:ro
      - ../../data:/data
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    command: ["python", "-m", "app.cli.mcp_server"]
    ports:
      - "127.0.0.1:8201:8200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8200),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
        reservations:
          memory: 128M
          cpus: "0.10"
  mcp-public:
    profiles:
      - mcp-public
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    container_name: ratatoskr-mcp-public
    init: true
    env_file:
      - path: ../../.env
        required: false
    environment:
      - MCP_ENABLED=true
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8200
      - MCP_AUTH_MODE=jwt
      - MCP_ALLOW_REMOTE_SSE=true
      - MCP_FORWARDED_ACCESS_TOKEN_HEADER=${MCP_FORWARDED_ACCESS_TOKEN_HEADER:-X-Ratatoskr-Forwarded-Access-Token}
      - MCP_FORWARDED_SECRET_HEADER=${MCP_FORWARDED_SECRET_HEADER:-X-Ratatoskr-MCP-Forwarding-Secret}
      - MCP_FORWARDING_SECRET=${MCP_FORWARDING_SECRET:-}
      - DB_PATH=/data/ratatoskr.db
      - QDRANT_URL=http://qdrant:6333
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ../../data:/data
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp
    command: ["python", "-m", "app.cli.mcp_server"]
    ports:
      - "127.0.0.1:8202:8200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8200),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
        reservations:
          memory: 128M
          cpus: "0.10"

  cloud-ollama-check:
    profiles:
      - with-cloud-ollama
    image: curlimages/curl:8.16.0
    container_name: ratatoskr-cloud-ollama-check
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
    command:
      - sh
      - -c
      - |
        if [ "$${LLM_PROVIDER}" != "ollama" ]; then
          echo "LLM_PROVIDER is not ollama; remote cloud Ollama check skipped."
          exit 0
        fi
        curl -fsS "$${OLLAMA_BASE_URL%/}/models" >/dev/null
    restart: "no"

  firecrawl-api:
    profiles:
      - with-scrapers
    image: ${FIRECRAWL_IMAGE:-ghcr.io/firecrawl/firecrawl:latest}
    container_name: ratatoskr-firecrawl-api
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - INTERNAL_PORT=3002
      - USE_DB_AUTHENTICATION=false
      - REDIS_URL=redis://firecrawl-redis:6379
      - REDIS_RATE_LIMIT_URL=redis://firecrawl-redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000/scrape
      - NUQ_RABBITMQ_URL=amqp://firecrawl-rabbitmq:5672
      - POSTGRES_HOST=firecrawl-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${FIRECRAWL_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${FIRECRAWL_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${FIRECRAWL_POSTGRES_DB:-postgres}
      - BULL_AUTH_KEY=${FIRECRAWL_BULL_AUTH_KEY:-ratatoskr-local}
      - ENV=local
    command: ["node", "dist/src/harness.js", "--start-docker"]
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      firecrawl-playwright:
        condition: service_started
      firecrawl-redis:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3002/serverHealthCheck').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  firecrawl-playwright:
    profiles:
      - with-scrapers
    image: ${FIRECRAWL_PLAYWRIGHT_IMAGE:-ghcr.io/firecrawl/playwright-service:latest}
    container_name: ratatoskr-firecrawl-playwright
    environment:
      - PORT=3000
      - MAX_CONCURRENT_PAGES=${FIRECRAWL_MAX_CONCURRENT_PAGES:-2}
      - BLOCK_MEDIA=${FIRECRAWL_BLOCK_MEDIA:-true}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.createConnection(3000,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),5000)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  firecrawl-redis:
    profiles:
      - with-scrapers
    image: redis:7-alpine
    container_name: ratatoskr-firecrawl-redis
    command: ["redis-server", "--bind", "0.0.0.0", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - firecrawl_redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  firecrawl-rabbitmq:
    profiles:
      - with-scrapers
    image: rabbitmq:3-management
    container_name: ratatoskr-firecrawl-rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - firecrawl_rabbitmq_data:/var/lib/rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  firecrawl-postgres:
    profiles:
      - with-scrapers
    image: ${FIRECRAWL_POSTGRES_IMAGE:-ghcr.io/firecrawl/nuq-postgres:latest}
    container_name: ratatoskr-firecrawl-postgres
    environment:
      - POSTGRES_USER=${FIRECRAWL_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${FIRECRAWL_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${FIRECRAWL_POSTGRES_DB:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - firecrawl_postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  crawl4ai:
    profiles:
      - with-scrapers
    # Pinned to 0.8.0 (stable; "latest" tag tracks this version per upstream).
    # To upgrade: check https://hub.docker.com/r/unclecode/crawl4ai/tags
    image: unclecode/crawl4ai:0.8.0
    container_name: ratatoskr-crawl4ai
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
      - INSTALL_TYPE=all
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11235/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  defuddle-api:
    profiles:
      - with-scrapers
    build:
      context: ./defuddle
    container_name: ratatoskr-defuddle-api
    environment:
      # Set DEFUDDLE_AUTH_TOKEN in .env to enable Bearer auth (empty = auth disabled)
      - DEFUDDLE_AUTH_TOKEN=${DEFUDDLE_AUTH_TOKEN:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  cloakbrowser:
    profiles:
      - with-scrapers
    # Upstream stealth-Chromium sidecar (CloakHQ/CloakBrowser). Pinned by
    # multi-arch manifest digest (NOT by tag) — the binary's BINARY-LICENSE.md
    # forbids redistribution, so we never bake it into our own image, and a
    # mutable tag in a stealth tool is exactly the supply-chain surface to
    # lock down. To upgrade: resolve the new digest with
    #   curl -sI -H "Authorization: Bearer $(curl -s 'https://auth.docker.io/token?service=registry.docker.io&scope=repository:cloakhq/cloakbrowser:pull' | jq -r .token)" \
    #            -H "Accept: application/vnd.oci.image.index.v1+json" \
    #            https://registry-1.docker.io/v2/cloakhq/cloakbrowser/manifests/<new-tag> \
    #     | rg -i docker-content-digest
    # then update the digest below. The 0.3.30 tag is preserved in a comment
    # for human readability only — Docker uses the digest.
    image: ${CLOAKBROWSER_IMAGE:-cloakhq/cloakbrowser@sha256:a333b754fe9da1fd16851f2bb69f258601d4c7fa36e8b26c15f1e031241076c1}  # 0.3.30
    container_name: ratatoskr-cloakbrowser
    command: ["cloakserve", "--host", "0.0.0.0", "--port", "9222"]
    environment:
      # Reproducible deploys: never let the binary self-update inside the
      # container at runtime. Pinning the image digest is undone if the
      # process rewrites itself on first run.
      - CLOAKBROWSER_AUTO_UPDATE=false
    # Port is intentionally NOT published to the host — sidecar is only reached
    # over the internal compose network by the ratatoskr/worker/mobile-api
    # services. Exposing it would put an unauthenticated CDP endpoint on the
    # host network (full remote code execution surface).
    restart: unless-stopped
    deploy:
      resources:
        # Sized for upstream's published footprint (~190 MB idle, ~280 MB with
        # 3 tabs, +30 MB per tab). 512 MB covers idle + 4 concurrent tabs with
        # comfortable headroom; bump if you start seeing OOM kills under load.
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9222/json/version', timeout=3).status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  prometheus:
    profiles:
      - with-monitoring
    image: prom/prometheus:v2.48.0
    container_name: ratatoskr-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      mobile-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    profiles:
      - with-monitoring
    image: grafana/grafana:10.2.2
    container_name: ratatoskr-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-this-grafana-password}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3001
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    profiles:
      - with-monitoring
    image: grafana/loki:2.9.2
    container_name: ratatoskr-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    profiles:
      - with-monitoring
    image: grafana/promtail:2.9.2
    container_name: ratatoskr-promtail
    restart: unless-stopped
    volumes:
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  node-exporter:
    profiles:
      - with-monitoring
    image: prom/node-exporter:v1.8.2
    container_name: ratatoskr-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/credentials)($|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.13.6}
    container_name: ratatoskr-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_HOST_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: ratatoskr-postgres
    environment:
      - POSTGRES_DB=ratatoskr
      - POSTGRES_USER=ratatoskr_app
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ratatoskr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"
        reservations:
          memory: 256M
          cpus: "0.10"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ratatoskr-redis
    # AOF persistence so Taskiq queue state and distributed-lock keys survive
    # a Redis restart. `appendfsync everysec` is the standard durability/perf
    # trade-off: at most ~1s of writes lost on a hard crash.
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
      ]
    volumes:
      - redis_data:/data
    # No host port binding: Redis is internal-only, accessed by other containers
    # via Docker DNS (redis:6379). Exposing the port to the host would allow any
    # process on the host to reach an unauthenticated Redis instance.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
volumes:
  ratatoskr_postgres_data:
  qdrant_data:
  redis_data:
  firecrawl_redis_data:
  firecrawl_rabbitmq_data:
  firecrawl_postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
