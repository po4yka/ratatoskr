# Prometheus alerting rules for Ratatoskr
#
# These rules define conditions that trigger alerts:
# - High error rate
# - Circuit breaker open
# - High latency
# - Database issues

groups:
  - name: ratatoskr_availability
    rules:
      - alert: RatatoskrApplicationProcessDown
        expr: up{job=~"ratatoskr-(mobile-api|bot|worker|scheduler)"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} metrics endpoint is down"
          description: "Prometheus cannot scrape {{ $labels.instance }}; check the container and process logs"

      # High error rate alert
      - alert: RatatoskrHighErrorRate
        expr: |
          (
            sum(rate(ratatoskr_requests_total{status="error"}[5m]))
            /
            sum(rate(ratatoskr_requests_total[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # Critical error rate
      - alert: RatatoskrCriticalErrorRate
        expr: |
          (
            sum(rate(ratatoskr_requests_total{status="error"}[5m]))
            /
            sum(rate(ratatoskr_requests_total[5m]))
          ) > 0.25
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} - immediate attention required"

  - name: ratatoskr_circuit_breakers
    rules:
      # Circuit breaker open
      - alert: RatatoskrCircuitBreakerOpen
        expr: ratatoskr_circuit_breaker_state > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker is open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} has been open for more than 1 minute"

      # Circuit breaker stuck open
      - alert: RatatoskrCircuitBreakerStuckOpen
        expr: ratatoskr_circuit_breaker_state > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker stuck open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} has been open for more than 5 minutes - manual intervention may be required"

      # Scheduler job chronically failing
      - alert: RatatoskrSchedulerJobChronicallyFailing
        expr: increase(ratatoskr_scheduler_job_chronic_failures_total[15m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.job_id }} failing 3+ consecutive ticks"
          description: "Job {{ $labels.job_id }} has failed at least 3 ticks in a row - check journalctl for scheduler_job_chronic_failure events"

  - name: ratatoskr_latency
    rules:
      # High request latency
      - alert: RatatoskrHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(ratatoskr_request_latency_seconds_bucket[5m])) by (le, type)
          ) > 120
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency for {{ $labels.type }}"
          description: "p99 latency is {{ $value | humanizeDuration }} for {{ $labels.type }} requests"

      # High Firecrawl latency
      - alert: RatatoskrFirecrawlHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(ratatoskr_firecrawl_latency_seconds_bucket[5m])) by (le, endpoint)
          ) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Firecrawl latency for {{ $labels.endpoint }}"
          description: "p95 Firecrawl latency is {{ $value | humanizeDuration }}"

      # High OpenRouter latency
      - alert: RatatoskrOpenRouterHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(ratatoskr_openrouter_latency_seconds_bucket[5m])) by (le, model)
          ) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High OpenRouter latency for {{ $labels.model }}"
          description: "p95 OpenRouter latency is {{ $value | humanizeDuration }}"

  - name: ratatoskr_database
    rules:
      # Slow database queries
      - alert: RatatoskrSlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(ratatoskr_db_query_latency_seconds_bucket[5m])) by (le, operation)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "p95 database query latency is {{ $value | humanizeDuration }} for {{ $labels.operation }}"

      # Automated PostgreSQL backup freshness
      - alert: RatatoskrPostgresBackupStale
        expr: |
          (time() - ratatoskr_pg_backup_last_success_timestamp_seconds) > 129600
          or absent(ratatoskr_pg_backup_last_success_timestamp_seconds)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Automated PostgreSQL backup is stale"
          description: "No successful PostgreSQL backup has been recorded for more than 36 hours. Check the ratatoskr-pg-backup container logs and the configured BACKUP_HOST_DIR."

  - name: ratatoskr_mcp_security
    rules:
      - alert: RatatoskrMCPUnscopedEnabledInProduction
        expr: ratatoskr_mcp_unscoped_enabled{app_env="production"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "MCP unscoped SSE is enabled in production"
          description: "The MCP SSE server is running without request auth or startup user scope in production. Disable MCP_ALLOW_UNSCOPED_SSE or scope the server with MCP_USER_ID / MCP_AUTH_MODE=jwt."

  - name: ratatoskr_auth_security
    rules:
      - alert: RatatoskrTokenFamilyRevocationDetected
        expr: increase(ratatoskr_token_family_decisions_total{decision="revoke_family"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Possible credential theft — family revocation detected"
          description: "A refresh-token family was revoked after retired-token replay in the last 5 minutes. Inspect refresh_family_revoked audit logs, source IP, client_id, and the affected user before restoring access."

      - alert: RatatoskrCredentialsLoginRateLimitedHigh
        expr: increase(ratatoskr_rate_limit_hits_total{bucket="credentials_login"}[15m]) > 20
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Credentials-login rate limits are firing"
          description: "More than 20 credentials-login requests were rate-limited in 15 minutes. Treat this as possible credential stuffing; inspect source IPs, client IDs, and credentials_login_failed logs."

  - name: ratatoskr_external_services
    rules:
      # Firecrawl high error rate
      - alert: RatatoskrFirecrawlHighErrors
        expr: |
          (
            sum(rate(ratatoskr_firecrawl_requests_total{status="error"}[5m]))
            /
            sum(rate(ratatoskr_firecrawl_requests_total[5m]))
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Firecrawl error rate"
          description: "Firecrawl error rate is {{ $value | humanizePercentage }}"

      # No Firecrawl requests (service may be down)
      - alert: RatatoskrFirecrawlNoRequests
        expr: |
          sum(rate(ratatoskr_firecrawl_requests_total[10m])) == 0
          and
          sum(rate(ratatoskr_requests_total{type="url"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No Firecrawl requests despite URL processing"
          description: "URL requests are being processed but no Firecrawl API calls - check circuit breaker or caching"

  - name: ratatoskr_github_sync
    rules:
      - alert: RatatoskrGitHubSyncRateLimitedConsecutively
        expr: ratatoskr_github_sync_rate_limit_streak > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "GitHub sync rate-limited for user {{ $labels.user_id }}"
          description: "GitHub starred-repository sync has been rate-limited for user {{ $labels.user_id }} for more than 3 consecutive runs. Check the stored PAT/OAuth token, GitHub rate-limit reset time, and sync frequency."

      - alert: RatatoskrGitHubSyncLLMBudgetCapHigh
        expr: |
          (
            sum(increase(ratatoskr_github_sync_llm_calls_total{trigger="deferred"}[24h]))
            /
            clamp_min(sum(increase(ratatoskr_github_sync_llm_calls_total{trigger="made"}[24h])), 1)
          ) > 0.9
          and
          sum(increase(ratatoskr_github_sync_llm_calls_total{trigger="deferred"}[24h])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "GitHub sync LLM budget cap is deferring most repository analysis"
          description: "Deferred GitHub repository analysis calls exceeded 90% of completed calls over 24h. Increase GITHUB_LLM_DAILY_BUDGET, reduce imported repository volume, or schedule a backfill window."

  - name: ratatoskr_costs
    rules:
      # High OpenRouter spending
      - alert: RatatoskrHighOpenRouterSpending
        expr: |
          sum(increase(ratatoskr_openrouter_cost_usd_total[1h])) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High OpenRouter spending"
          description: "OpenRouter costs in the last hour: ${{ $value | printf \"%.2f\" }}"

      # Very high daily spending
      - alert: RatatoskrVeryHighDailySpending
        expr: |
          sum(increase(ratatoskr_openrouter_cost_usd_total[24h])) > 100
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Very high daily OpenRouter spending"
          description: "OpenRouter costs in the last 24 hours: ${{ $value | printf \"%.2f\" }}"

      - alert: RatatoskrWebSearchEnrichmentCostRegression
        expr: |
          sum(rate(ratatoskr_web_search_decisions_total{decision="executed"}[30m]))
          >
          2 * clamp_min(
            sum(rate(ratatoskr_web_search_decisions_total{decision="executed"}[24h])),
            0.001
          )
          and
          sum(increase(ratatoskr_web_search_decisions_total{decision="executed"}[30m])) > 10
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Web-search enrichment execution rate is above baseline"
          description: "Web-search enrichment executed at more than 2x its 24h baseline for 30 minutes. Check recent prompt/config changes and OpenRouter cost by purpose=\"web_search\"."

  - name: ratatoskr_tts
    rules:
      - alert: RatatoskrTTSQuotaExceeded
        expr: increase(ratatoskr_tts_requests_total{outcome="quota_exceeded"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ElevenLabs TTS quota exhausted"
          description: "At least one ElevenLabs text-to-speech request hit quota exhaustion in the last 5 minutes. Check ELEVENLABS_API_KEY quota, recent TTS request volume, and any retry loops."

      - alert: RatatoskrTTSHTTPErrorRateHigh
        expr: |
          (
            sum(rate(ratatoskr_tts_requests_total{outcome="http_error"}[15m]))
            /
            clamp_min(sum(rate(ratatoskr_tts_requests_total{outcome!="retry"}[15m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ElevenLabs TTS HTTP error rate exceeds 5%"
          description: "ElevenLabs text-to-speech HTTP errors are above 5% over 15 minutes. Check provider status, API key validity, and request payload compatibility."

  - name: ratatoskr_llm_retry_budget
    rules:
      # Retry-budget exhaustion: ratio of requests that burned through
      # the entire fallback chain. >5% over 15m indicates an upstream
      # outage or a prompt regression.
      - alert: RatatoskrLLMRetryExhaustionHigh
        expr: |
          (
            sum(rate(ratatoskr_llm_call_retry_exhaustion_total[15m]))
            /
            sum(rate(ratatoskr_llm_call_attempts_total{status="success"}[15m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM retry budget exhaustion exceeded 5%/15m"
          description: |
            More than 5% of LLM requests in the last 15 minutes burned
            through the full fallback chain. Check OpenRouter status and
            recent prompt changes. Current rate: {{ $value | humanizePercentage }}.

  - name: ratatoskr_vector_reconciler
    rules:
      - alert: RatatoskrVectorReconcilerStalenessLagHigh
        expr: ratatoskr_vector_reconcile_oldest_lag_seconds > 3600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Vector reconciler stale-row lag exceeds two default cron periods"
          description: "The oldest stale vector row has lagged for {{ $value | humanizeDuration }}. The default VECTOR_RECONCILE_CRON is every 30 minutes, so this alert fires after lag exceeds two expected runs."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/vector-index-sync.md"

      - alert: RatatoskrVectorReconcilerStopped
        expr: |
          absent(ratatoskr_vector_reconcile_runs_total)
          or
          sum(increase(ratatoskr_vector_reconcile_runs_total[1h])) == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Vector reconciler has not reported a run"
          description: "No vector reconciler run status has been observed for two default VECTOR_RECONCILE_CRON periods. Check the Taskiq worker, Redis lock state, and ratatoskr.vector.reconcile logs."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/vector-index-sync.md"

  - name: ratatoskr_taskiq_retries
    rules:
      - alert: RatatoskrTaskiqDeadLettersHigh
        expr: sum(increase(ratatoskr_taskiq_retries_total{outcome="dead_letter"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taskiq jobs are reaching the dead-letter queue"
          description: "At least one Taskiq job exhausted its retry policy and was persisted to taskiq_failed_jobs in the last 15 minutes. Inspect the failed payload and replay only after confirming the upstream cause is fixed."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/runbooks/taskiq-failures.md"

  - name: ratatoskr_channel_digest
    rules:
      - alert: RatatoskrDigestDeliveryFailureRateHigh
        expr: |
          (
            sum(increase(ratatoskr_digest_deliveries_total{status="failed"}[1h]))
            /
            clamp_min(sum(increase(ratatoskr_digest_deliveries_total[1h])), 1)
          ) > 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Channel digest delivery failures exceed 10% over 1h"
          description: "Digest delivery failures are above the warning threshold. Check digest_delivery, digest_analysis_failed, digest_send_chunk_failed, and channel fetch logs for the current deployment."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/reference/digest-subsystem-ops.md"

      - alert: RatatoskrScheduledDigestNoDeliveries
        expr: |
          max_over_time(ratatoskr_digest_active_subscription_users[24h]) > 0
          and
          sum(increase(ratatoskr_digest_deliveries_total{status=~"sent|empty"}[24h])) == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Scheduled channel digest produced no deliveries with active subscriptions"
          description: "The scheduled digest runner saw active subscribers in the last 24 hours, but no successful or empty digest delivery outcomes were recorded. Check the scheduler, Taskiq worker, Redis lock, userbot session, and delivery logs."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/reference/digest-subsystem-ops.md"

      - alert: RatatoskrDigestUserbotReconnectsHigh
        expr: increase(ratatoskr_digest_userbot_reconnects_total[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Digest userbot reconnect rate exceeds 3/h"
          description: "The digest Telethon userbot session has restarted more than three times in the last hour. Check scheduler cadence, worker restarts, session validity, and Telegram-side throttling."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/reference/digest-subsystem-ops.md"
