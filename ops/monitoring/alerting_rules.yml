# Prometheus alerting rules for Ratatoskr
#
# These rules define conditions that trigger alerts:
# - High error rate
# - Circuit breaker open
# - High latency
# - Database issues

groups:
  - name: ratatoskr_availability
    rules:
      # High error rate alert
      - alert: RatatoskrHighErrorRate
        expr: |
          (
            sum(rate(ratatoskr_requests_total{status="error"}[5m]))
            /
            sum(rate(ratatoskr_requests_total[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # Critical error rate
      - alert: RatatoskrCriticalErrorRate
        expr: |
          (
            sum(rate(ratatoskr_requests_total{status="error"}[5m]))
            /
            sum(rate(ratatoskr_requests_total[5m]))
          ) > 0.25
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} - immediate attention required"

  - name: ratatoskr_circuit_breakers
    rules:
      # Circuit breaker open
      - alert: RatatoskrCircuitBreakerOpen
        expr: ratatoskr_circuit_breaker_state > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker is open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} has been open for more than 1 minute"

      # Circuit breaker stuck open
      - alert: RatatoskrCircuitBreakerStuckOpen
        expr: ratatoskr_circuit_breaker_state > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker stuck open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} has been open for more than 5 minutes - manual intervention may be required"

      # Scheduler job chronically failing
      - alert: RatatoskrSchedulerJobChronicallyFailing
        expr: increase(ratatoskr_scheduler_job_chronic_failures_total[15m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.job_id }} failing 3+ consecutive ticks"
          description: "Job {{ $labels.job_id }} has failed at least 3 ticks in a row - check journalctl for scheduler_job_chronic_failure events"

  - name: ratatoskr_latency
    rules:
      # High request latency
      - alert: RatatoskrHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(ratatoskr_request_latency_seconds_bucket[5m])) by (le, type)
          ) > 120
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency for {{ $labels.type }}"
          description: "p99 latency is {{ $value | humanizeDuration }} for {{ $labels.type }} requests"

      # High Firecrawl latency
      - alert: RatatoskrFirecrawlHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(ratatoskr_firecrawl_latency_seconds_bucket[5m])) by (le, endpoint)
          ) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Firecrawl latency for {{ $labels.endpoint }}"
          description: "p95 Firecrawl latency is {{ $value | humanizeDuration }}"

      # High OpenRouter latency
      - alert: RatatoskrOpenRouterHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(ratatoskr_openrouter_latency_seconds_bucket[5m])) by (le, model)
          ) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High OpenRouter latency for {{ $labels.model }}"
          description: "p95 OpenRouter latency is {{ $value | humanizeDuration }}"

  - name: ratatoskr_database
    rules:
      # Slow database queries
      - alert: RatatoskrSlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(ratatoskr_db_query_latency_seconds_bucket[5m])) by (le, operation)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "p95 database query latency is {{ $value | humanizeDuration }} for {{ $labels.operation }}"

      # Automated PostgreSQL backup freshness
      - alert: RatatoskrPostgresBackupStale
        expr: |
          (time() - ratatoskr_pg_backup_last_success_timestamp_seconds) > 129600
          or absent(ratatoskr_pg_backup_last_success_timestamp_seconds)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Automated PostgreSQL backup is stale"
          description: "No successful PostgreSQL backup has been recorded for more than 36 hours. Check the ratatoskr-pg-backup container logs and the configured BACKUP_HOST_DIR."

  - name: ratatoskr_mcp_security
    rules:
      - alert: RatatoskrMCPUnscopedEnabledInProduction
        expr: ratatoskr_mcp_unscoped_enabled{app_env="production"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "MCP unscoped SSE is enabled in production"
          description: "The MCP SSE server is running without request auth or startup user scope in production. Disable MCP_ALLOW_UNSCOPED_SSE or scope the server with MCP_USER_ID / MCP_AUTH_MODE=jwt."

  - name: ratatoskr_external_services
    rules:
      # Firecrawl high error rate
      - alert: RatatoskrFirecrawlHighErrors
        expr: |
          (
            sum(rate(ratatoskr_firecrawl_requests_total{status="error"}[5m]))
            /
            sum(rate(ratatoskr_firecrawl_requests_total[5m]))
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Firecrawl error rate"
          description: "Firecrawl error rate is {{ $value | humanizePercentage }}"

      # No Firecrawl requests (service may be down)
      - alert: RatatoskrFirecrawlNoRequests
        expr: |
          sum(rate(ratatoskr_firecrawl_requests_total[10m])) == 0
          and
          sum(rate(ratatoskr_requests_total{type="url"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No Firecrawl requests despite URL processing"
          description: "URL requests are being processed but no Firecrawl API calls - check circuit breaker or caching"

  - name: ratatoskr_costs
    rules:
      # High OpenRouter spending
      - alert: RatatoskrHighOpenRouterSpending
        expr: |
          increase(ratatoskr_openrouter_cost_usd_total[1h]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High OpenRouter spending"
          description: "OpenRouter costs in the last hour: ${{ $value | printf \"%.2f\" }}"

      # Very high daily spending
      - alert: RatatoskrVeryHighDailySpending
        expr: |
          increase(ratatoskr_openrouter_cost_usd_total[24h]) > 100
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Very high daily OpenRouter spending"
          description: "OpenRouter costs in the last 24 hours: ${{ $value | printf \"%.2f\" }}"

  - name: ratatoskr_llm_retry_budget
    rules:
      # Retry-budget exhaustion: ratio of requests that burned through
      # the entire fallback chain. >5% over 15m indicates an upstream
      # outage or a prompt regression.
      - alert: RatatoskrLLMRetryExhaustionHigh
        expr: |
          (
            sum(rate(ratatoskr_llm_call_retry_exhaustion_total[15m]))
            /
            sum(rate(ratatoskr_llm_call_attempts_total{status="success"}[15m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM retry budget exhaustion exceeded 5%/15m"
          description: |
            More than 5% of LLM requests in the last 15 minutes burned
            through the full fallback chain. Check OpenRouter status and
            recent prompt changes. Current rate: {{ $value | humanizePercentage }}.

  - name: ratatoskr_vector_reconciler
    rules:
      - alert: RatatoskrVectorReconcilerStalenessLagHigh
        expr: ratatoskr_vector_reconcile_oldest_lag_seconds > 3600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Vector reconciler stale-row lag exceeds two default cron periods"
          description: "The oldest stale vector row has lagged for {{ $value | humanizeDuration }}. The default VECTOR_RECONCILE_CRON is every 30 minutes, so this alert fires after lag exceeds two expected runs."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/vector-index-sync.md"

      - alert: RatatoskrVectorReconcilerStopped
        expr: |
          absent(ratatoskr_vector_reconcile_runs_total)
          or
          sum(increase(ratatoskr_vector_reconcile_runs_total[1h])) == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Vector reconciler has not reported a run"
          description: "No vector reconciler run status has been observed for two default VECTOR_RECONCILE_CRON periods. Check the Taskiq worker, Redis lock state, and ratatoskr.vector.reconcile logs."
          runbook_url: "https://github.com/po4yka/ratatoskr/blob/main/docs/vector-index-sync.md"
