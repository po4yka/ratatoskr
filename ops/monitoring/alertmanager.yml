# Alertmanager configuration for Ratatoskr.
#
# render-alertmanager-config.sh appends the configured webhook, Slack,
# Telegram webhook, and PagerDuty integrations at the marker below. It refuses
# to start production without at least one valid integration.

global:
  resolve_timeout: 5m

route:
  receiver: configured
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: configured
    # RECEIVER_CONFIGS
