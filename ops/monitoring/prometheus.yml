# Prometheus configuration for Ratatoskr
# Optimized for Raspberry Pi 5 with 30s scrape interval

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'ratatoskr'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule files
rule_files:
  - 'alerting_rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Ratatoskr Mobile API
  - job_name: 'ratatoskr-mobile-api'
    metrics_path: '/internal/metrics'
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_bearer_token
    static_configs:
      - targets: ['mobile-api:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ratatoskr-mobile-api'

  # Host metrics via node-exporter sidecar
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'raspberrypi'
